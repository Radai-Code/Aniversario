<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Libro Eterno 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
  :root {
    --rose-deep: #c2678a;
    --rose-mid: #e8839f;
    --rose-pale: #fce4ec;
    --gold: #d4a76a;
    --ink: #3a2a35;
    --parchment: #fef9f2;
    --shadow: rgba(60,20,40,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #e91e8c22 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; overflow: hidden;
  }

  /* ── RESPONSIVIDAD (CORRECCIÓN) ── */
  @media (max-width: 500px) {
    .book-scene {
      width: 90vw !important;
      height: 65vh !important;
    }
    .quote { font-size: 1rem !important; line-height: 1.3 !important; }
    .page-content { padding: 20px 15px !important; }
    .counter-box { font-size: 0.75rem !important; padding: 6px 15px !important; }
    .music-ui { 
      bottom: 15px !important; 
      right: 15px !important; 
      scale: 0.85;
      background: white !important; 
    }
    .add-btn { bottom: 15px !important; left: 15px !important; scale: 0.85; }
  }

  /* ── PARTÍCULAS ── */
  #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* ── CONTADOR ── */
  .counter-box {
    position: relative; z-index: 10;
    background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,180,0.5); border-radius: 50px;
    padding: 8px 24px; margin-bottom: 18px;
    font-size: 0.85rem; color: var(--ink); text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
    animation: fadeDown 0.8s ease both;
  }
  .counter-box span { color: var(--rose-deep); font-weight: 700; font-family: 'Playfair Display', serif; }
  .counter-since {
    font-size: 0.7rem; color: var(--rose-deep); opacity: 0.7;
    margin-top: 2px; font-style: italic;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:translateY(0); } }

  /* ── LIBRO ── */
  .book-scene {
    position: relative; z-index: 10; perspective: 2000px;
    width: min(380px, 90vw); height: min(480px, 70vh);
    animation: fadeUp 0.9s 0.2s ease both;
  }

  .book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

  .book::after {
    content: ''; position: absolute; bottom: -18px; left: 8%;
    width: 84%; height: 20px;
    background: radial-gradient(ellipse, rgba(194,103,138,0.3) 0%, transparent 70%);
    filter: blur(5px);
  }

  .book-spine {
    position: absolute; left: 0; top: 0; width: 30px; height: 100%;
    background: linear-gradient(180deg, var(--rose-deep) 0%, #a04e70 50%, var(--rose-deep) 100%);
    border-radius: 6px 0 0 6px; z-index: 200;
    box-shadow: -2px 0 8px rgba(60,20,40,0.25);
  }
  .spine-dot {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }

  /* ── PÁGINAS ── */
  .page {
    position: absolute; top: 5px; left: 30px;
    width: calc(100% - 35px); height: calc(100% - 10px);
    background: var(--parchment); border-radius: 0 10px 10px 0;
    transform-origin: left center;
    transition: transform 0.85s cubic-bezier(0.645, 0.045, 0.355, 1);
    transform-style: preserve-3d; backface-visibility: hidden;
    box-shadow: inset 3px 0 10px rgba(0,0,0,0.05), 2px 2px 8px rgba(0,0,0,0.12);
  }

  .page::after {
    content: ''; position: absolute; inset: 0; border-radius: 0 10px 10px 0; pointer-events: none;
    background: repeating-linear-gradient(transparent, transparent 32px, rgba(232,160,180,0.1) 32px, rgba(232,160,180,0.1) 33px);
  }

  .page:not(.cover-page)::before {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 0; height: 0; border-style: solid;
    border-width: 0 0 24px 24px;
    border-color: transparent transparent rgba(232,160,180,0.2) transparent;
    transition: border-width 0.3s;
    z-index: 3;
  }
  .page:not(.cover-page):hover::before {
    border-width: 0 0 42px 42px;
    border-color: transparent transparent rgba(232,160,180,0.45) transparent;
  }

  .page.flipped { transform: rotateY(-180deg); }

  .page-content {
    position: absolute; inset: 0; padding: 30px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; backface-visibility: hidden; border-radius: 0 10px 10px 0;
  }
  .page-back-content {
    position: absolute; inset: 0; padding: 30px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; backface-visibility: hidden; border-radius: 0 10px 10px 0;
    transform: rotateY(180deg);
    background: #fdf5f8;
  }

  .ornament { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 10px auto; }
  .quote { font-size: 1.15rem; font-style: italic; color: var(--ink); line-height: 1.55; margin: 8px 0; }
  .author { font-size: 0.72rem; color: var(--rose-deep); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
  .page-num { position: absolute; bottom: 12px; font-size: 0.65rem; color: rgba(60,20,40,0.3); font-style: italic; }
  .page-num.right { right: 16px; }
  .page-num.left  { left: 16px; }

  /* PORTADA */
  .cover-page {
    background: linear-gradient(135deg, #f4b8cf 0%, #e8839f 40%, #c2678a 100%) !important;
    z-index: 150; color: white; border-radius: 0 12px 12px 0;
    cursor: pointer;
  }
  .cover-page .page-content { background: transparent; }
  .cover-border { position: absolute; inset: 14px; border: 1.5px solid rgba(255,255,255,0.35); border-radius: 0 8px 8px 0; }

  /* NAVEGACIÓN */
  .nav-bar {
    position: relative; z-index: 10; display: flex; align-items: center; gap: 14px;
    margin-top: 18px; animation: fadeUp 1s 0.4s ease both;
  }
  .nav-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(194,103,138,0.4);
    background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
    color: var(--rose-deep); font-size: 1.2rem; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px var(--shadow);
  }
  .nav-btn:hover { background: var(--rose-deep); color: white; transform: scale(1.08); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; transform: none; }
  .page-indicator { font-size: 0.8rem; color: var(--ink); opacity: 0.55; min-width: 60px; text-align: center; font-family: 'Playfair Display', serif; }

  /* MODAL Y BOTONES EXTRAS */
  .add-btn {
    position: fixed; bottom: 25px; left: 25px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
    border: 2px solid var(--rose-deep); color: var(--rose-deep);
    font-size: 1.6rem; font-weight: 300; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 14px var(--shadow);
  }
  
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(60,20,40,0.45);
    backdrop-filter: blur(6px); z-index: 2000;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--parchment); border-radius: 20px; padding: 32px 28px; width: min(420px, 100%); box-shadow: 0 20px 60px rgba(60,20,40,0.3); }

  /* MÚSICA UI (CORRECCIÓN) */
  .music-ui {
    position: fixed; bottom: 25px; right: 25px; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.9); padding: 8px 16px; border-radius: 40px;
    border: 2px solid var(--rose-deep); box-shadow: 0 4px 15px var(--shadow);
    backdrop-filter: blur(10px);
  }
  .m-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--rose-deep); transition: 0.2s; }
  #track-name { font-size: 0.6rem; color: var(--rose-deep); font-weight: bold; min-width: 80px; text-align: center; text-transform: uppercase; letter-spacing: 0.08em; }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  @keyframes blink  { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="counter-box">
  <div>Llevamos <span id="days-count">0</span> días juntos · <span id="hms">00h 00m 00s</span></div>
  <div class="counter-since" id="since-line"></div>
</div>

<div class="book-scene">
  <div class="book" id="book">
    <div class="book-spine">
      <div class="spine-dot" style="top:20%"></div>
      <div class="spine-dot" style="top:50%"></div>
      <div class="spine-dot" style="top:80%"></div>
    </div>
    <div id="pages-container"></div>
    <div class="page cover-page" id="cover" onclick="openBook()" style="z-index:150;">
      <div class="cover-border"></div>
      <div class="page-content">
        <div style="font-size:2rem;margin-bottom:12px;animation:pulse 2.5s ease-in-out infinite">💖</div>
        <h2 style="font-family:'Playfair Display';font-size:2rem;color:white;font-style:italic;">Para Ti</h2>
        <p style="margin-top:8px;font-style:italic;color:rgba(255,255,255,0.85);font-size:0.95rem;">Nuestra historia en cada página</p>
        <div style="margin-top:30px;font-size:0.65rem;letter-spacing:3px;animation:blink 2s ease-in-out infinite">✦ TOCA PARA ABRIR ✦</div>
      </div>
    </div>
  </div>
</div>

<div class="nav-bar" id="nav-bar" style="display:none">
  <button class="nav-btn" id="btn-prev" onclick="prevPage()">←</button>
  <div class="page-indicator" id="page-indicator">1 / 1</div>
  <button class="nav-btn" id="btn-next" onclick="nextPage()">→</button>
</div>

<button class="add-btn" id="add-btn" onclick="openModal()" style="display:none">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="color:var(--rose-deep); text-align:center; margin-bottom:10px;">✦ Escribir en el libro</h3>
    <textarea id="inp-quote" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--rose-mid);" rows="3" placeholder='"Tu mensaje aquí..."'></textarea>
    <input id="inp-author" style="width:100%; margin-top:10px; padding:8px; border-radius:10px; border:1px solid var(--rose-mid);" type="text" placeholder="Tu nombre">
    <div style="display:flex; gap:10px; margin-top:20px;">
        <button onclick="closeModal()" style="flex:1; padding:10px; border-radius:20px; border:1px solid var(--rose-deep); background:transparent; color:var(--rose-deep); cursor:pointer;">Cancelar</button>
        <button onclick="saveQuote()" style="flex:1; padding:10px; border-radius:20px; border:none; background:var(--rose-deep); color:white; cursor:pointer;">Guardar 💖</button>
    </div>
  </div>
</div>

<iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/114946051&auto_play=false" style="display:none"></iframe>

<div class="music-ui">
  <button class="m-btn" onclick="changeTrack(-1)">⏮</button>
  <button class="m-btn" id="play-pause" onclick="toggleMusic()">▷</button>
  <button class="m-btn" onclick="changeTrack(1)">⏭</button>
  <div id="track-name">♩ MÚSICA</div>
</div>

<script>
const ANNIVERSARY = new Date("2024-12-13T00:00:00");
const fixedPages = [
  { quote: "No importa lo que pase mañana, te quiero hoy.", source: "Nuestro Camino Eterno" },
  { quote: "¿Me amas? ¿Real o no real? —Real.", source: "Los Juegos del Hambre" },
  { quote: "Eres lo único que me hace sentir seguro en este mundo.", source: "Los Juegos del Hambre" },
  { quote: "Ella no me necesita. Y yo... yo no puedo vivir sin ella.", source: "Los Juegos del Hambre" },
  { quote: "—Buenas noches, Liam. —Buenas noches, supernova.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "No quiero que me bajen la luna, quiero que alguien se siente a verla conmigo.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "Aprendí que el hogar no es un lugar, es una persona. Y mi hogar eres tú.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "Rompe mi corazón si quieres, pero no te vayas. Nunca lo hagas.", source: "Boulevard" },
  { quote: "Ahora sé que la droga más fuerte de un ser humano es otro ser humano.", source: "Boulevard" },
  { quote: "Luke era el sol y yo la luna, y en un mundo perfecto, el eclipse sería eterno.", source: "Boulevard" },
  { quote: "—Sí, me gusta —sonreí—. Tú me gustas.", source: "Boulevard" },
  { quote: "Si el mundo se acaba hoy, me gustaría que me encontrara a tu lado.", source: "Boulevard" },
];

let allPages = [];
let currentIdx = -1;
let isOpen = false;
let isFlipping = false;

// MÚSICA LÓGICA (CORREGIDA PARA REPRODUCCIÓN COMPLETA)
const tracks = [
  { name: "The Reason", url: "https://api.soundcloud.com/tracks/114946051" },
  { name: "Wonderwall", url: "https://api.soundcloud.com/tracks/10292723" }
];
let currentTrack = 0;
const widget = SC.Widget(document.getElementById('sc-widget'));
let isPlaying = false;

function buildPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = ''; allPages = [];
  const custom = JSON.parse(localStorage.getItem('libro_frases') || '[]');
  const combined = [...fixedPages, ...custom];

  combined.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = combined.length - i;
    page.innerHTML = `
      <div class="page-content">
        <div class="ornament"></div>
        <p class="quote">"${q.quote}"</p>
        <div class="ornament"></div>
        <span class="author">${q.source || q.book || 'Corazón'}</span>
        <div class="page-num right">Pág. ${(i+1)*2-1}</div>
      </div>
      <div class="page-back-content">
        <div style="font-size:1.5rem;">💖</div>
        <div class="page-num left">Pág. ${(i+1)*2}</div>
      </div>
    `;
    container.appendChild(page);
    allPages.push(page);
  });
  updateNav();
}

function openBook() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('cover').classList.add('flipped');
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('add-btn').style.display = 'flex';
  if(!isPlaying) toggleMusic();
  setTimeout(() => { goToPage(0); }, 700);
}

function goToPage(target) {
  if (isFlipping || target === currentIdx || target < 0 || target >= allPages.length) return;
  isFlipping = true;
  if (target > currentIdx) {
    for (let i = currentIdx + 1; i <= target; i++) allPages[i].classList.add('flipped');
  } else {
    for (let i = currentIdx; i > target; i--) allPages[i].classList.remove('flipped');
  }
  currentIdx = target;
  updateNav();
  setTimeout(() => isFlipping = false, 850);
}

function nextPage() { goToPage(currentIdx + 1); }
function prevPage() { goToPage(currentIdx - 1); }
function updateNav() { document.getElementById('page-indicator').textContent = `${currentIdx + 1} / ${allPages.length}`; }

function toggleMusic() {
  if (isPlaying) { widget.pause(); document.getElementById('play-pause').innerText = '▷'; }
  else { widget.play(); document.getElementById('play-pause').innerText = '⏸'; }
  isPlaying = !isPlaying;
}

function changeTrack(dir) {
  currentTrack = (currentTrack + dir + tracks.length) % tracks.length;
  widget.load(tracks[currentTrack].url, { auto_play: true });
  document.getElementById('track-name').innerText = tracks[currentTrack].name;
  isPlaying = true;
  document.getElementById('play-pause').innerText = '⏸';
}

function openModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function saveQuote() {
  const quote = document.getElementById('inp-quote').value;
  const author = document.getElementById('inp-author').value;
  if(!quote) return;
  const quotes = JSON.parse(localStorage.getItem('libro_frases') || '[]');
  quotes.push({ quote, source: author || 'Nosotros' });
  localStorage.setItem('libro_frases', JSON.stringify(quotes));
  closeModal(); buildPages();
}

function updateCounter() {
  const diff = new Date() - ANNIVERSARY;
  const days = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('days-count').textContent = days;
  document.getElementById('hms').textContent = `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}
setInterval(updateCounter, 1000); updateCounter();
document.getElementById('since-line').textContent = `Desde el ${ANNIVERSARY.toLocaleDateString()} 💖`;

// PARTÍCULAS
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = [];
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (particles.length < 15 && Math.random() < 0.05) particles.push({ x: Math.random() * canvas.width, y: canvas.height + 10, speedY: -(Math.random() * 0.4 + 0.2), opacity: 0.5 });
  particles.forEach((p, i) => {
    p.y += p.speedY; p.opacity -= 0.001;
    ctx.fillStyle = `rgba(232,160,180,${p.opacity})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    if (p.opacity <= 0) particles.splice(i, 1);
  });
  requestAnimationFrame(animate);
}
animate(); buildPages();
</script>
</body>
</html>
