<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Ti 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose-deep: #c2678a;
    --gold: #d4a76a;
    --ink: #3a2a35;
    --parchment: #fef9f2;
    --shadow: rgba(60,20,40,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%; overflow: hidden;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd0 35%, #f48fb1 70%, #e91e8c18 100%);
    font-family: 'Cormorant Garamond', serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
  }

  #particles-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

  /* ── LAYOUT PRINCIPAL ── */
  .main-layout {
    position: relative; z-index: 10;
    width: 100%; max-width: 480px;
    height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px 16px;
    gap: 10px;
  }

  /* ── CONTADOR ── */
  .counter-box {
    background: rgba(255,255,255,0.6); backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,180,0.45); border-radius: 40px;
    padding: 7px 20px; text-align: center;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem); color: var(--ink);
    box-shadow: 0 3px 14px var(--shadow); width: 100%;
  }
  .counter-box span { color: var(--rose-deep); font-weight:700; font-family:'Playfair Display',serif; }
  .counter-since { font-size: clamp(0.6rem, 2vw, 0.72rem); color:var(--rose-deep); opacity:0.75; font-style:italic; margin-top:2px; }

  /* ── LIBRO ── */
  .book-scene {
    perspective: 1800px;
    width: 100%;
    flex: 1;
    min-height: 0;
    max-height: 420px;
  }
  .book {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
  }
  .book-spine {
    position:absolute; left:0; top:0; width:28px; height:100%;
    background: linear-gradient(180deg,var(--rose-deep) 0%,#a04e70 50%,var(--rose-deep) 100%);
    border-radius:6px 0 0 6px; z-index:200;
    box-shadow:-2px 0 8px rgba(60,20,40,0.25);
  }
  .spine-dot {
    position:absolute; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.4);
  }

  /* ── PÁGINAS ── */
  .page {
    position:absolute; top:4px; left:28px;
    width:calc(100% - 32px); height:calc(100% - 8px);
    background:var(--parchment); border-radius:0 10px 10px 0;
    transform-origin:left center;
    transition: transform 0.8s cubic-bezier(0.645,0.045,0.355,1);
    transform-style:preserve-3d; backface-visibility:hidden;
    box-shadow:inset 3px 0 8px rgba(0,0,0,0.04), 2px 2px 6px rgba(0,0,0,0.1);
  }
  .page::after {
    content:''; position:absolute; inset:0; border-radius:0 10px 10px 0; pointer-events:none;
    background:repeating-linear-gradient(transparent,transparent 30px,rgba(232,160,180,0.09) 30px,rgba(232,160,180,0.09) 31px);
  }
  .page:not(.cover-page)::before {
    content:''; position:absolute; bottom:0; right:0; z-index:3;
    border-style:solid; border-width:0 0 20px 20px;
    border-color:transparent transparent rgba(232,160,180,0.18) transparent;
    transition:border-width 0.3s;
  }
  .page:not(.cover-page):hover::before {
    border-width:0 0 36px 36px;
    border-color:transparent transparent rgba(232,160,180,0.4) transparent;
  }
  .page.flipped { transform:rotateY(-180deg); }

  .page-content {
    position:absolute; inset:0; padding:clamp(16px,4vw,30px) clamp(14px,4vw,26px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; backface-visibility:hidden; border-radius:0 10px 10px 0;
  }
  .page-back-content {
    position:absolute; inset:0; padding:clamp(16px,4vw,30px) clamp(14px,4vw,26px);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; backface-visibility:hidden; border-radius:0 10px 10px 0;
    transform:rotateY(180deg); background:#fdf5f8;
  }

  .ornament { width:44px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:8px auto; }
  .quote { font-size:clamp(0.9rem,3vw,1.15rem); font-style:italic; color:var(--ink); line-height:1.55; margin:6px 0; }
  .author { font-size:clamp(0.6rem,2vw,0.72rem); color:var(--rose-deep); letter-spacing:2px; text-transform:uppercase; font-weight:bold; }
  .page-num { position:absolute; bottom:10px; font-size:0.6rem; color:rgba(60,20,40,0.28); font-style:italic; }
  .page-num.right { right:14px; } .page-num.left { left:14px; }
  .custom-tag { font-size:0.62rem; color:var(--rose-deep); opacity:0.6; margin-top:5px; font-style:italic; }
  .custom-date-tag { font-size:0.58rem; color:rgba(60,20,40,0.32); margin-top:3px; }
  .custom-badge {
    font-size:0.58rem; letter-spacing:0.12em; text-transform:uppercase;
    background:var(--rose-deep); color:white; padding:2px 9px; border-radius:20px; margin-bottom:7px; display:inline-block;
  }
  .delete-page-btn {
    position:absolute; top:9px; right:10px;
    background:rgba(255,255,255,0.85); border:1.5px solid rgba(194,103,138,0.3);
    border-radius:50%; width:28px; height:28px;
    display:flex; align-items:center; justify-content:center;
    font-size:1rem; line-height:1; cursor:pointer; transition:all 0.2s; color:var(--rose-deep);
    z-index:5;
  }
  .delete-page-btn:hover { background:#fee; border-color:#c2678a; transform:scale(1.1); }

  /* ── PORTADA ── */
  .cover-page {
    background:linear-gradient(135deg,#f4b8cf 0%,#e8839f 40%,#c2678a 100%) !important;
    z-index:150; color:white; border-radius:0 12px 12px 0; cursor:pointer;
  }
  .cover-page .page-content { background:transparent; }
  .cover-border { position:absolute; inset:12px; border:1.5px solid rgba(255,255,255,0.3); border-radius:0 8px 8px 0; }

  /* ── NAVEGACIÓN ── */
  .nav-bar {
    display:flex; align-items:center; gap:12px; width:100%; justify-content:center;
  }
  .nav-btn {
    width:42px; height:42px; border-radius:50%;
    border:2px solid rgba(194,103,138,0.35);
    background:rgba(255,255,255,0.65); backdrop-filter:blur(8px);
    color:var(--rose-deep); font-size:1.1rem; cursor:pointer;
    transition:all 0.2s; display:flex; align-items:center; justify-content:center;
    box-shadow:0 3px 10px var(--shadow); touch-action:manipulation;
  }
  .nav-btn:active { transform:scale(0.93); }
  .nav-btn:hover  { background:var(--rose-deep); color:white; }
  .nav-btn:disabled { opacity:0.22; cursor:default; }
  .page-indicator { font-size:0.82rem; color:var(--ink); opacity:0.5; min-width:55px; text-align:center; font-family:'Playfair Display',serif; }

  /* ── SPOTIFY VISIBLE ── */
  .spotify-wrap {
    width:100%; border-radius:14px; overflow:hidden;
    box-shadow:0 4px 18px var(--shadow);
    display:none;
  }
  .spotify-wrap iframe { display:block; width:100%; height:80px; border:none; border-radius:14px; }

  /* ── BOTÓN AGREGAR ── */
  .add-btn {
    position:fixed; bottom:20px; left:20px; z-index:1000;
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.88); backdrop-filter:blur(10px);
    border:2px solid var(--rose-deep); color:var(--rose-deep);
    font-size:1.7rem; font-weight:300; line-height:1;
    cursor:pointer; transition:all 0.2s;
    display:none; align-items:center; justify-content:center;
    box-shadow:0 4px 14px var(--shadow); touch-action:manipulation;
  }
  .add-btn:active { transform:scale(0.93); }
  .add-btn:hover  { background:var(--rose-deep); color:white; }

  /* ── MODALES ── */
  .modal-overlay, .confirm-overlay {
    position:fixed; inset:0; background:rgba(60,20,40,0.45);
    backdrop-filter:blur(6px); z-index:2000;
    display:none; align-items:center; justify-content:center; padding:16px;
  }
  .modal-overlay.show, .confirm-overlay.show { display:flex; }
  .modal {
    background:var(--parchment); border-radius:20px;
    padding:clamp(20px,5vw,32px) clamp(18px,5vw,28px);
    width:min(420px,100%); max-height:90vh; overflow-y:auto;
    box-shadow:0 20px 60px rgba(60,20,40,0.3);
    animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.88) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal h3 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--rose-deep); text-align:center; margin-bottom:5px; }
  .modal p.modal-sub { font-size:0.78rem; color:rgba(60,20,40,0.5); text-align:center; margin-bottom:18px; font-style:italic; }
  .modal label { font-size:0.75rem; color:var(--rose-deep); letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:4px; margin-top:12px; }
  .modal input, .modal textarea {
    width:100%; padding:10px 13px; border-radius:10px;
    border:1.5px solid rgba(232,160,180,0.5); background:white;
    font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--ink);
    resize:none; outline:none; transition:border 0.2s;
    -webkit-appearance:none;
  }
  .modal input:focus, .modal textarea:focus { border-color:var(--rose-deep); }
  .modal-btns { display:flex; gap:10px; margin-top:18px; }
  .modal-save {
    flex:1; padding:11px; border-radius:30px; border:none;
    background:var(--rose-deep); color:white; font-family:'Playfair Display',serif;
    font-size:0.95rem; cursor:pointer; transition:0.2s; touch-action:manipulation;
  }
  .modal-save:active { transform:scale(0.97); }
  .modal-cancel {
    padding:11px 16px; border-radius:30px;
    border:2px solid rgba(194,103,138,0.4); background:transparent;
    color:var(--rose-deep); font-size:0.88rem; cursor:pointer; transition:0.2s;
  }
  .confirm-box {
    background:var(--parchment); border-radius:20px; padding:26px 24px;
    width:min(320px,100%); text-align:center;
    box-shadow:0 20px 60px rgba(60,20,40,0.3);
    animation:modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .confirm-box h3 { font-family:'Playfair Display',serif; color:var(--rose-deep); font-size:1.15rem; margin-bottom:8px; }
  .confirm-box p  { font-size:0.82rem; color:rgba(60,20,40,0.6); font-style:italic; margin-bottom:18px; line-height:1.5; }
  .confirm-btns   { display:flex; gap:10px; justify-content:center; }
  .confirm-yes { padding:10px 22px; border-radius:30px; border:none; background:var(--rose-deep); color:white; font-family:'Playfair Display',serif; font-size:0.92rem; cursor:pointer; }
  .confirm-no  { padding:10px 18px; border-radius:30px; border:2px solid rgba(194,103,138,0.4); background:transparent; color:var(--rose-deep); font-size:0.88rem; cursor:pointer; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:75px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--rose-deep); color:white; padding:9px 22px;
    border-radius:30px; font-size:0.82rem; z-index:3000;
    opacity:0; transition:all 0.35s; pointer-events:none; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── CORAZONES ── */
  .float-heart { position:fixed; font-size:1.3rem; pointer-events:none; z-index:99; animation:floatUp 2.2s ease-out forwards; }
  @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-55vh) scale(0.3);opacity:0} }

  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  @keyframes blink  { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="main-layout">

  <!-- CONTADOR -->
  <div class="counter-box">
    <div>Llevamos <span id="days-count">0</span> días juntos · <span id="hms">00h 00m 00s</span></div>
    <div class="counter-since" id="since-line"></div>
  </div>

  <!-- LIBRO -->
  <div class="book-scene">
    <div class="book" id="book">
      <div class="book-spine">
        <div class="spine-dot" style="top:20%"></div>
        <div class="spine-dot" style="top:50%"></div>
        <div class="spine-dot" style="top:80%"></div>
      </div>
      <div id="pages-container"></div>
      <!-- PORTADA -->
      <div class="page cover-page" id="cover" onclick="openBook()" style="z-index:150;">
        <div class="cover-border"></div>
        <div class="page-content">
          <div style="font-size:clamp(1.5rem,5vw,2rem);margin-bottom:10px;animation:pulse 2.5s ease-in-out infinite">💖</div>
          <h2 style="font-family:'Playfair Display';font-size:clamp(1.5rem,5vw,2rem);color:white;font-style:italic;text-shadow:0 2px 8px rgba(60,20,40,0.3)">Para Ti</h2>
          <p style="margin-top:8px;font-style:italic;color:rgba(255,255,255,0.85);font-size:clamp(0.8rem,2.5vw,0.95rem);">Nuestra historia en cada página</p>
          <div style="margin-top:24px;font-size:clamp(0.55rem,1.8vw,0.65rem);letter-spacing:3px;color:rgba(255,255,255,0.7);animation:blink 2s ease-in-out infinite">✦ TOCA PARA ABRIR ✦</div>
        </div>
      </div>
    </div>
  </div>

  <!-- NAVEGACIÓN -->
  <div class="nav-bar" id="nav-bar" style="display:none">
    <button class="nav-btn" id="btn-prev" onclick="prevPage()">←</button>
    <div class="page-indicator" id="page-indicator">1 / 1</div>
    <button class="nav-btn" id="btn-next" onclick="nextPage()">→</button>
  </div>

  <!-- SPOTIFY VISIBLE — canción completa, sin límite de 30s -->
  <div class="spotify-wrap" id="spotify-wrap">
    <iframe id="spotify-player"
      src="https://open.spotify.com/embed/playlist/5gvxyfrpTOLmHdC8VCb4Iw?utm_source=generator&theme=0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy">
    </iframe>
  </div>

</div><!-- /main-layout -->

<!-- BOTÓN AGREGAR -->
<button class="add-btn" id="add-btn" title="Escribir en el libro" onclick="openModal()">+</button>

<!-- MODAL AGREGAR -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>✦ Escribir en el libro</h3>
    <p class="modal-sub">Tu frase quedará guardada para siempre</p>
    <label>Tu frase o mensaje</label>
    <textarea id="inp-quote" rows="3" placeholder='"Lo que siento por ti no tiene nombre..."'></textarea>
    <label>De parte de</label>
    <input id="inp-author" type="text" placeholder="Tu nombre">
    <label>Libro o fuente <span style="opacity:0.5;font-size:0.68rem">(opcional)</span></label>
    <input id="inp-book" type="text" placeholder="Ej: Nuestro diario...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveQuote()">Guardar 💖</button>
    </div>
  </div>
</div>

<!-- MODAL ELIMINAR -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-box">
    <h3>¿Eliminar esta frase?</h3>
    <p id="confirm-preview"></p>
    <div class="confirm-btns">
      <button class="confirm-no"  onclick="closeConfirm()">Cancelar</button>
      <button class="confirm-yes" onclick="deleteQuote()">Eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// PÁGINAS FIJAS
// ════════════════════════════════════════════
const fixedPages = [
  { quote:"No importa lo que pase mañana, te quiero hoy.", source:"Nuestro Camino Eterno" },
  { quote:"¿Me amas? ¿Real o no real? —Real.", source:"Los Juegos del Hambre" },
  { quote:"Eres lo único que me hace sentir seguro en este mundo.", source:"Los Juegos del Hambre" },
  { quote:"Ella no me necesita. Y yo... yo no puedo vivir sin ella.", source:"Los Juegos del Hambre" },
  { quote:"—Buenas noches, Liam. —Buenas noches, supernova.", source:"Hasta que nos quedemos sin estrellas" },
  { quote:"No quiero que me bajen la luna, quiero que alguien se siente a verla conmigo.", source:"Hasta que nos quedemos sin estrellas" },
  { quote:"Aprendí que el hogar no es un lugar, es una persona. Y mi hogar eres tú.", source:"Hasta que nos quedemos sin estrellas" },
  { quote:"Rompe mi corazón si quieres, pero no te vayas. Nunca lo hagas.", source:"Boulevard" },
  { quote:"Ahora sé que la droga más fuerte de un ser humano es otro ser humano.", source:"Boulevard" },
  { quote:"Luke era el sol y yo la luna, y en un mundo perfecto, el eclipse sería eterno.", source:"Boulevard" },
  { quote:"—Sí, me gusta —sonreí—. Tú me gustas.", source:"Boulevard" },
  { quote:"Si el mundo se acaba hoy, me gustaría que me encontrara a tu lado.", source:"Boulevard" },
];

// ════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════
const ANNIVERSARY = new Date("2024-12-13T00:00:00");
let allPages = [];
let currentIdx = -1;
let isOpen = false;
let isFlipping = false;

// ════════════════════════════════════════════
// CONSTRUIR PÁGINAS
// ════════════════════════════════════════════
function buildPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  allPages = [];

  const custom = loadCustomQuotes();
  const all = [...fixedPages, ...custom];

  all.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = all.length - i;

    const isCustom = i >= fixedPages.length;
    const dateStr = isCustom && q.savedAt
      ? new Date(q.savedAt).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})
      : '';

    page.innerHTML = `
      <div class="page-content">
        ${isCustom ? `<div class="custom-badge">✦ Escrito por nosotros ✦</div>` : ''}
        <div class="ornament"></div>
        <p class="quote">"${q.quote}"</p>
        <div class="ornament"></div>
        <span class="author">${q.source||q.book||''}</span>
        ${isCustom&&q.author ? `<div class="custom-tag">— ${q.author}</div>` : ''}
        ${isCustom&&dateStr  ? `<div class="custom-date-tag">${dateStr}</div>` : ''}
        ${isCustom ? `<button class="delete-page-btn" onclick="confirmDelete(${i-fixedPages.length})">×</button>` : ''}
        <div class="page-num right">Pág. ${(i+1)*2-1}</div>
      </div>
      <div class="page-back-content">
        <div class="ornament"></div>
        <div style="font-size:1.4rem;margin:6px 0">💖</div>
        <div style="font-size:0.78rem;font-style:italic;color:rgba(60,20,40,0.38)">Con amor, siempre</div>
        <div class="ornament"></div>
        <div class="page-num left">Pág. ${(i+1)*2}</div>
      </div>`;

    container.appendChild(page);
    allPages.push(page);
  });
}

// ════════════════════════════════════════════
// NAVEGACIÓN — lógica robusta con steps[]
// ════════════════════════════════════════════
function updateNav() {
  document.getElementById('btn-prev').disabled = currentIdx <= 0;
  document.getElementById('btn-next').disabled = currentIdx >= allPages.length - 1;
  document.getElementById('page-indicator').textContent = `${currentIdx+1} / ${allPages.length}`;
}

function openBook() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('cover').classList.add('flipped');
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('add-btn').style.display = 'flex';
  document.getElementById('spotify-wrap').style.display = 'block';
  setTimeout(() => goToPage(0), 700);
}

function goToPage(targetIdx) {
  if (isFlipping) return;
  if (targetIdx === currentIdx) return;
  if (targetIdx < 0 || targetIdx >= allPages.length) return;

  isFlipping = true;
  const steps = [];

  if (targetIdx > currentIdx) {
    for (let i = currentIdx+1; i <= targetIdx; i++) steps.push({el: allPages[i], flip: true});
  } else {
    for (let i = currentIdx; i > targetIdx; i--) steps.push({el: allPages[i], flip: false});
  }

  let s = 0;
  const run = () => {
    if (s >= steps.length) {
      currentIdx = targetIdx;
      updateNav();
      isFlipping = false;
      return;
    }
    const {el, flip} = steps[s];
    flip ? el.classList.add('flipped') : el.classList.remove('flipped');
    s++;
    setTimeout(run, steps.length === 1 ? 0 : 115);
  };
  run();
}

function nextPage() { if (!isFlipping) goToPage(currentIdx+1); }
function prevPage() { if (!isFlipping) goToPage(currentIdx-1); }

// Teclado
document.addEventListener('keydown', e => {
  if (!isOpen) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') nextPage();
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   prevPage();
});

// Swipe
let tx = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e => {
  if (!isOpen) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (dx < -45) nextPage();
  if (dx >  45) prevPage();
});

// ════════════════════════════════════════════
// FRASES PERSONALIZADAS
// ════════════════════════════════════════════
function loadCustomQuotes() {
  try { return JSON.parse(localStorage.getItem('libro_frases')||'[]'); } catch{ return []; }
}
function saveCustomQuotes(arr) { localStorage.setItem('libro_frases', JSON.stringify(arr)); }

function openModal() {
  ['inp-quote','inp-author','inp-book'].forEach(id => document.getElementById(id).value='');
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveQuote() {
  const quote  = document.getElementById('inp-quote').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const book   = document.getElementById('inp-book').value.trim();
  if (!quote) { document.getElementById('inp-quote').focus(); return; }

  const quotes = loadCustomQuotes();
  quotes.push({ quote, author, source: book||'Nuestro libro', book, savedAt: Date.now() });
  saveCustomQuotes(quotes);
  closeModal();
  buildPages();
  setTimeout(() => goToPage(allPages.length-1), 350);
  showToast('✦ Frase guardada en el libro 💖');
  spawnHearts();
}

// ─ Eliminar ─
let pendingDeleteIdx = -1;

function confirmDelete(customIdx) {
  pendingDeleteIdx = customIdx;
  const q = loadCustomQuotes()[customIdx];
  document.getElementById('confirm-preview').textContent =
    q ? `"${q.quote.substring(0,60)}${q.quote.length>60?'...':''}"` : '';
  document.getElementById('confirm-modal').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
  pendingDeleteIdx = -1;
}
function deleteQuote() {
  if (pendingDeleteIdx < 0) return;
  const quotes = loadCustomQuotes();
  quotes.splice(pendingDeleteIdx, 1);
  saveCustomQuotes(quotes);
  closeConfirm();

  const newIdx = Math.min(currentIdx, fixedPages.length + quotes.length - 1);
  currentIdx = -1;
  buildPages();
  for (let i=0; i<=newIdx; i++) allPages[i]?.classList.add('flipped');
  currentIdx = newIdx;
  updateNav();
  showToast('Frase eliminada');
}

// Cerrar modales al tocar fuera
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
document.getElementById('confirm-modal').addEventListener('click', function(e){ if(e.target===this) closeConfirm(); });

// ─ Helpers ─
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2600);
}
function spawnHearts() {
  const emojis=['💖','💗','💕','🌹','✨'];
  for(let i=0;i<6;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='float-heart';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left=(20+Math.random()*60)+'vw'; el.style.bottom='18vh';
    document.body.appendChild(el); setTimeout(()=>el.remove(),2300);
  }, i*110);
}

// ════════════════════════════════════════════
// CONTADOR
// ════════════════════════════════════════════
function updateCounter() {
  const diff = new Date() - ANNIVERSARY;
  if (diff < 0) return;
  const days = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  document.getElementById('days-count').textContent = days;
  document.getElementById('hms').textContent =
    `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}
document.getElementById('since-line').textContent =
  `Desde el ${ANNIVERSARY.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})} 💖`;
setInterval(updateCounter, 1000); updateCounter();

// ════════════════════════════════════════════
// PARTÍCULAS (ligeras)
// ════════════════════════════════════════════
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width=innerWidth; canvas.height=innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();

let parts = [];
(function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if (parts.length < 15 && Math.random() < 0.07)
    parts.push({x:Math.random()*canvas.width, y:canvas.height+8, sy:-(Math.random()*0.45+0.18), o:0.55});
  parts = parts.filter(p=>p.o>0);
  parts.forEach(p=>{
    p.y+=p.sy; p.o-=0.0011;
    ctx.fillStyle=`rgba(232,160,180,${p.o})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
  });
  requestAnimationFrame(loop);
})();

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
buildPages();
</script>
