<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Ti 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --rose:    #c2678a;
  --gold:    #d4a76a;
  --ink:     #3a2a35;
  --parch:   #fef9f2;
  --sh:      rgba(60,20,40,0.16);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html { height:100%; }
body {
  min-height:100%; height:100%;
  background: radial-gradient(ellipse at 35% 15%, #fce4ec 0%, #f8bbd0 38%, #f48fb1 72%, transparent 100%),
              linear-gradient(160deg,#fce4ec,#f8bbd0);
  font-family:'Cormorant Garamond',serif;
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; overflow:hidden;
}

canvas#bg { position:fixed; inset:0; pointer-events:none; z-index:0; }

/* ─── WRAPPER CENTRAL ─── */
.wrap {
  position:relative; z-index:10;
  width:min(440px, 96vw);
  display:flex; flex-direction:column; align-items:center;
  gap:clamp(8px,2vh,14px);
  padding: clamp(10px,2vh,18px) 0;
}

/* ─── CONTADOR ─── */
.counter {
  width:100%;
  background:rgba(255,255,255,0.58); backdrop-filter:blur(14px);
  border:1px solid rgba(232,160,180,0.4); border-radius:40px;
  padding:clamp(6px,1.5vh,9px) clamp(14px,4vw,22px);
  text-align:center; color:var(--ink);
  font-size:clamp(0.68rem,2.2vw,0.85rem);
  box-shadow:0 3px 16px var(--sh);
}
.counter b { color:var(--rose); font-family:'Playfair Display',serif; }
.counter small { display:block; font-size:clamp(0.58rem,1.8vw,0.7rem); color:var(--rose); opacity:.72; font-style:italic; margin-top:2px; }

/* ─── LIBRO ─── */
.book-scene {
  width:100%;
  height: clamp(260px, 44vh, 400px);
  perspective:1800px;
  flex-shrink:0;
}
.book { width:100%; height:100%; position:relative; transform-style:preserve-3d; }

.spine {
  position:absolute; left:0; top:0; width:26px; height:100%;
  background:linear-gradient(180deg,var(--rose) 0%,#9e4b6a 50%,var(--rose) 100%);
  border-radius:6px 0 0 6px; z-index:200;
  box-shadow:-2px 0 8px rgba(60,20,40,0.22);
}
.spine-dot { position:absolute; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:rgba(255,255,255,0.38); }

.page {
  position:absolute; top:4px; left:26px;
  width:calc(100% - 30px); height:calc(100% - 8px);
  background:var(--parch); border-radius:0 10px 10px 0;
  transform-origin:left center;
  transition:transform .8s cubic-bezier(.645,.045,.355,1);
  transform-style:preserve-3d; backface-visibility:hidden;
  box-shadow:inset 2px 0 8px rgba(0,0,0,.04), 2px 2px 6px rgba(0,0,0,.1);
}
.page::after {
  content:''; position:absolute; inset:0; border-radius:0 10px 10px 0;
  pointer-events:none;
  background:repeating-linear-gradient(transparent,transparent 30px,rgba(232,160,180,.08) 30px,rgba(232,160,180,.08) 31px);
}
.page:not(.cover)::before {
  content:''; position:absolute; bottom:0; right:0; z-index:3;
  border-style:solid; border-width:0 0 18px 18px;
  border-color:transparent transparent rgba(232,160,180,.18) transparent;
  transition:border-width .3s;
}
.page:not(.cover):hover::before { border-width:0 0 34px 34px; border-color:transparent transparent rgba(232,160,180,.38) transparent; }
.page.flipped { transform:rotateY(-180deg); }

/* frente y dorso */
.front, .back {
  position:absolute; inset:0;
  padding:clamp(12px,3.5vw,26px) clamp(12px,3.5vw,24px);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; backface-visibility:hidden; border-radius:0 10px 10px 0;
}
.back { transform:rotateY(180deg); background:#fdf5f8; }

.line  { width:42px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:7px auto; }
.quote { font-size:clamp(.82rem,2.8vw,1.1rem); font-style:italic; color:var(--ink); line-height:1.52; margin:5px 0; }
.src   { font-size:clamp(.55rem,1.7vw,.7rem); color:var(--rose); letter-spacing:2px; text-transform:uppercase; font-weight:700; }
.pn    { position:absolute; bottom:9px; font-size:.58rem; color:rgba(60,20,40,.26); font-style:italic; }
.pn.r  { right:12px; } .pn.l { left:12px; }
.ctag  { font-size:.6rem; color:var(--rose); opacity:.6; margin-top:4px; font-style:italic; }
.dtag  { font-size:.56rem; color:rgba(60,20,40,.3); margin-top:3px; }
.cbadge{ font-size:.56rem; letter-spacing:.12em; text-transform:uppercase; background:var(--rose); color:white; padding:2px 9px; border-radius:20px; margin-bottom:6px; display:inline-block; }
.del-btn {
  position:absolute; top:8px; right:9px;
  background:rgba(255,255,255,.85); border:1.5px solid rgba(194,103,138,.28);
  border-radius:50%; width:27px; height:27px;
  display:flex; align-items:center; justify-content:center;
  font-size:.95rem; cursor:pointer; color:var(--rose); z-index:5;
  transition:all .2s;
}
.del-btn:active { transform:scale(.9); }

/* portada */
.cover {
  background:linear-gradient(135deg,#f4b8cf,#e8839f 45%,#c2678a) !important;
  z-index:150; cursor:pointer; border-radius:0 12px 12px 0;
}
.cover .front { background:transparent; }
.c-border { position:absolute; inset:12px; border:1.5px solid rgba(255,255,255,.3); border-radius:0 8px 8px 0; }

/* ─── NAV ─── */
.nav {
  display:flex; align-items:center; gap:12px;
}
.nbtn {
  width:clamp(36px,9vw,42px); height:clamp(36px,9vw,42px);
  border-radius:50%; border:2px solid rgba(194,103,138,.35);
  background:rgba(255,255,255,.65); backdrop-filter:blur(8px);
  color:var(--rose); font-size:1.1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 10px var(--sh); transition:all .18s;
  touch-action:manipulation;
}
.nbtn:active { transform:scale(.9); background:var(--rose); color:white; }
.nbtn:disabled { opacity:.2; cursor:default; }
.pind { font-size:.8rem; color:var(--ink); opacity:.5; min-width:52px; text-align:center; font-family:'Playfair Display',serif; }

/* ─── MÚSICA (YouTube mini) ─── */
.music-bar {
  width:100%;
  background:rgba(255,255,255,.7); backdrop-filter:blur(12px);
  border:1.5px solid rgba(194,103,138,.3); border-radius:16px;
  padding:clamp(8px,2vw,11px) clamp(10px,3vw,16px);
  display:flex; align-items:center; gap:10px;
  box-shadow:0 3px 14px var(--sh);
}
.mb-info { flex:1; min-width:0; }
.mb-info .mb-title { font-size:clamp(.65rem,2vw,.78rem); color:var(--rose); font-weight:700; letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mb-info .mb-sub   { font-size:clamp(.55rem,1.6vw,.65rem); color:var(--ink); opacity:.5; margin-top:2px; font-style:italic; }
.mb-controls { display:flex; gap:6px; flex-shrink:0; }
.mc {
  width:32px; height:32px; border-radius:50%;
  border:1.5px solid rgba(194,103,138,.35);
  background:rgba(255,255,255,.8);
  color:var(--rose); font-size:.95rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .18s; touch-action:manipulation;
}
.mc:active { background:var(--rose); color:white; transform:scale(.9); }
/* iframe YT oculto correctamente */
#yt { position:fixed; bottom:-400px; left:0; width:2px; height:2px; opacity:0; pointer-events:none; }

/* ─── BOTÓN + ─── */
.add-btn {
  position:fixed; bottom:clamp(14px,3vh,22px); left:clamp(14px,3vw,22px); z-index:1000;
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,.88); backdrop-filter:blur(10px);
  border:2px solid var(--rose); color:var(--rose);
  font-size:1.6rem; font-weight:300; line-height:1;
  cursor:pointer; display:none; align-items:center; justify-content:center;
  box-shadow:0 4px 14px var(--sh); touch-action:manipulation;
}
.add-btn:active { background:var(--rose); color:white; transform:scale(.92); }

/* ─── MODALES ─── */
.overlay {
  position:fixed; inset:0; background:rgba(60,20,40,.45);
  backdrop-filter:blur(6px); z-index:2000;
  display:none; align-items:center; justify-content:center; padding:14px;
}
.overlay.on { display:flex; }
.mbox {
  background:var(--parch); border-radius:20px;
  padding:clamp(18px,5vw,28px) clamp(16px,5vw,26px);
  width:min(400px,100%); max-height:92vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(60,20,40,.28);
  animation:mIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes mIn { from{opacity:0;transform:scale(.88) translateY(14px)} to{opacity:1;transform:none} }
.mbox h3 { font-family:'Playfair Display',serif; font-size:1.25rem; color:var(--rose); text-align:center; margin-bottom:4px; }
.mbox p.sub { font-size:.76rem; color:rgba(60,20,40,.48); text-align:center; margin-bottom:16px; font-style:italic; }
.mbox label { font-size:.72rem; color:var(--rose); letter-spacing:.09em; text-transform:uppercase; display:block; margin:11px 0 4px; }
.mbox input, .mbox textarea {
  width:100%; padding:9px 13px; border-radius:10px;
  border:1.5px solid rgba(232,160,180,.48); background:white;
  font-family:'Cormorant Garamond',serif; font-size:.98rem; color:var(--ink);
  resize:none; outline:none; transition:border .2s; -webkit-appearance:none;
}
.mbox input:focus,.mbox textarea:focus { border-color:var(--rose); }
.mbtns { display:flex; gap:9px; margin-top:16px; }
.msave {
  flex:1; padding:10px; border-radius:30px; border:none;
  background:var(--rose); color:white;
  font-family:'Playfair Display',serif; font-size:.92rem; cursor:pointer;
  touch-action:manipulation;
}
.msave:active { transform:scale(.97); }
.mcancel {
  padding:10px 15px; border-radius:30px;
  border:2px solid rgba(194,103,138,.38); background:transparent;
  color:var(--rose); font-size:.86rem; cursor:pointer;
}
.cbox {
  background:var(--parch); border-radius:20px; padding:24px 22px;
  width:min(310px,100%); text-align:center;
  box-shadow:0 20px 60px rgba(60,20,40,.28);
  animation:mIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
.cbox h3 { font-family:'Playfair Display',serif; color:var(--rose); font-size:1.1rem; margin-bottom:7px; }
.cbox p  { font-size:.8rem; color:rgba(60,20,40,.58); font-style:italic; margin-bottom:16px; line-height:1.5; }
.cbtns   { display:flex; gap:9px; justify-content:center; }
.cyes { padding:9px 20px; border-radius:30px; border:none; background:var(--rose); color:white; font-size:.9rem; cursor:pointer; }
.cno  { padding:9px 16px; border-radius:30px; border:2px solid rgba(194,103,138,.38); background:transparent; color:var(--rose); font-size:.86rem; cursor:pointer; }

/* ─── TOAST ─── */
.toast {
  position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(10px);
  background:var(--rose); color:white; padding:8px 20px;
  border-radius:30px; font-size:.8rem; z-index:3000;
  opacity:0; transition:all .35s; pointer-events:none; white-space:nowrap;
}
.toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

.fh { position:fixed; font-size:1.3rem; pointer-events:none; z-index:99; animation:fup 2s ease-out forwards; }
@keyframes fup { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-50vh) scale(.3);opacity:0} }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
@keyframes blink  { 0%,100%{opacity:.5} 50%{opacity:1} }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrap" id="wrap">

  <!-- CONTADOR -->
  <div class="counter">
    <div>Llevamos <b id="days">0</b> días · <b id="hms">00h 00m 00s</b></div>
    <small id="since"></small>
  </div>

  <!-- LIBRO -->
  <div class="book-scene">
    <div class="book">
      <div class="spine">
        <div class="spine-dot" style="top:22%"></div>
        <div class="spine-dot" style="top:50%"></div>
        <div class="spine-dot" style="top:78%"></div>
      </div>
      <div id="pc"></div>
      <!-- PORTADA -->
      <div class="page cover" id="cover" onclick="openBook()" style="z-index:150">
        <div class="c-border"></div>
        <div class="front">
          <div style="font-size:clamp(1.4rem,4.5vw,1.9rem);margin-bottom:8px;animation:pulse 2.5s ease-in-out infinite">💖</div>
          <h2 style="font-family:'Playfair Display';font-size:clamp(1.4rem,5vw,1.9rem);color:white;font-style:italic;text-shadow:0 2px 8px rgba(60,20,40,.3)">Para Ti</h2>
          <p style="margin-top:7px;font-style:italic;color:rgba(255,255,255,.85);font-size:clamp(.75rem,2.4vw,.92rem)">Nuestra historia en cada página</p>
          <div style="margin-top:clamp(14px,3vh,24px);font-size:clamp(.52rem,1.7vw,.64rem);letter-spacing:3px;color:rgba(255,255,255,.68);animation:blink 2s ease-in-out infinite">✦ TOCA PARA ABRIR ✦</div>
        </div>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav" id="nav" style="display:none">
    <button class="nbtn" id="bp" onclick="prevPage()">←</button>
    <div class="pind" id="pi">1 / 1</div>
    <button class="nbtn" id="bn" onclick="nextPage()">→</button>
  </div>

  <!-- MÚSICA — YouTube (canciones completas, sin límite) -->
  <div class="music-bar" id="mbar" style="display:none">
    <div class="mb-info">
      <div class="mb-title" id="mt">♩ The Reason</div>
      <div class="mb-sub">nuestra playlist</div>
    </div>
    <div class="mb-controls">
      <button class="mc" onclick="prevT()" title="Anterior">⟨</button>
      <button class="mc" id="pp" onclick="togglePlay()">▷</button>
      <button class="mc" onclick="nextT()" title="Siguiente">⟩</button>
    </div>
  </div>

</div><!-- /wrap -->

<!-- YouTube iframe oculto (NO display:none, solo fuera de pantalla) -->
<div id="yt"></div>

<!-- Botón agregar -->
<button class="add-btn" id="ab" onclick="openModal()">+</button>

<!-- Modal agregar -->
<div class="overlay" id="mo">
  <div class="mbox">
    <h3>✦ Escribir en el libro</h3>
    <p class="sub">Tu frase quedará guardada para siempre</p>
    <label>Tu frase o mensaje</label>
    <textarea id="iq" rows="3" placeholder='"Lo que siento por ti..."'></textarea>
    <label>De parte de</label>
    <input id="ia" type="text" placeholder="Tu nombre">
    <label>Fuente <span style="opacity:.45;font-size:.68rem">(opcional)</span></label>
    <input id="ib" type="text" placeholder="Nuestro diario...">
    <div class="mbtns">
      <button class="mcancel" onclick="closeModal()">Cancelar</button>
      <button class="msave"   onclick="saveQuote()">Guardar 💖</button>
    </div>
  </div>
</div>

<!-- Modal eliminar -->
<div class="overlay" id="co">
  <div class="cbox">
    <h3>¿Eliminar esta frase?</h3>
    <p id="cp"></p>
    <div class="cbtns">
      <button class="cno"  onclick="closeConfirm()">Cancelar</button>
      <button class="cyes" onclick="deleteQuote()">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CANCIONES — agrega o cambia IDs de YouTube aquí
// El ID es lo que va después de ?v= en el link
// ══════════════════════════════════════════════
const TRACKS = [
  { title:"The Reason",  id:"fV4DiAyExN0" },  // Hoobastank
  { title:"Wonderwall",  id:"bx1Bh8ZvH84" },  // Oasis
];

// ══════════════════════════════════════════════
// PÁGINAS FIJAS
// ══════════════════════════════════════════════
const FIXED = [
  { q:"No importa lo que pase mañana, te quiero hoy.",                               s:"Nuestro Camino Eterno" },
  { q:"¿Me amas? ¿Real o no real? —Real.",                                           s:"Los Juegos del Hambre" },
  { q:"Eres lo único que me hace sentir seguro en este mundo.",                       s:"Los Juegos del Hambre" },
  { q:"Ella no me necesita. Y yo... yo no puedo vivir sin ella.",                     s:"Los Juegos del Hambre" },
  { q:"—Buenas noches, Liam. —Buenas noches, supernova.",                            s:"Hasta que nos quedemos sin estrellas" },
  { q:"No quiero que me bajen la luna, quiero que alguien se siente a verla conmigo.",s:"Hasta que nos quedemos sin estrellas" },
  { q:"Aprendí que el hogar no es un lugar, es una persona. Y mi hogar eres tú.",    s:"Hasta que nos quedemos sin estrellas" },
  { q:"Rompe mi corazón si quieres, pero no te vayas. Nunca lo hagas.",              s:"Boulevard" },
  { q:"Ahora sé que la droga más fuerte de un ser humano es otro ser humano.",       s:"Boulevard" },
  { q:"Luke era el sol y yo la luna, y en un mundo perfecto, el eclipse sería eterno.",s:"Boulevard" },
  { q:"—Sí, me gusta —sonreí—. Tú me gustas.",                                      s:"Boulevard" },
  { q:"Si el mundo se acaba hoy, me gustaría que me encontrara a tu lado.",          s:"Boulevard" },
];

// ══════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════
const ANN = new Date("2024-12-13T00:00:00");
let pages=[], cur=-1, open=false, flipping=false;

// ══════════════════════════════════════════════
// PÁGINAS
// ══════════════════════════════════════════════
function loadQ() { try{return JSON.parse(localStorage.getItem('lf')||'[]')}catch{return[]} }
function saveQ(a) { localStorage.setItem('lf',JSON.stringify(a)); }

function build() {
  const c=document.getElementById('pc');
  c.innerHTML=''; pages=[];
  const all=[...FIXED,...loadQ()];
  all.forEach((q,i)=>{
    const custom=i>=FIXED.length;
    const ds=custom&&q.t?new Date(q.t).toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'}):'';
    const p=document.createElement('div');
    p.className='page'; p.style.zIndex=all.length-i;
    p.innerHTML=`
      <div class="front">
        ${custom?'<div class="cbadge">✦ Escrito por nosotros ✦</div>':''}
        <div class="line"></div>
        <p class="quote">"${q.q}"</p>
        <div class="line"></div>
        <span class="src">${q.s||''}</span>
        ${custom&&q.a?`<div class="ctag">— ${q.a}</div>`:''}
        ${custom&&ds?`<div class="dtag">${ds}</div>`:''}
        ${custom?`<button class="del-btn" onclick="confirmDel(${i-FIXED.length})">×</button>`:''}
        <div class="pn r">Pág. ${(i+1)*2-1}</div>
      </div>
      <div class="back">
        <div class="line"></div>
        <div style="font-size:1.3rem;margin:5px 0">💖</div>
        <div style="font-size:.74rem;font-style:italic;color:rgba(60,20,40,.36)">Con amor, siempre</div>
        <div class="line"></div>
        <div class="pn l">Pág. ${(i+1)*2}</div>
      </div>`;
    c.appendChild(p); pages.push(p);
  });
}

// ══════════════════════════════════════════════
// NAVEGACIÓN
// ══════════════════════════════════════════════
function nav() {
  document.getElementById('bp').disabled = cur<=0;
  document.getElementById('bn').disabled = cur>=pages.length-1;
  document.getElementById('pi').textContent = `${cur+1} / ${pages.length}`;
}

function openBook() {
  if(open) return; open=true;
  document.getElementById('cover').classList.add('flipped');
  document.getElementById('nav').style.display='flex';
  document.getElementById('ab').style.display='flex';
  document.getElementById('mbar').style.display='flex';
  setTimeout(()=>go(0), 700);
  // Iniciar música
  setTimeout(()=>{ if(ytReady) yt.playVideo(); }, 1200);
}

function go(t) {
  if(flipping||t===cur) return;
  if(t<0||t>=pages.length) return;
  flipping=true;
  const steps=[];
  if(t>cur) for(let i=cur+1;i<=t;i++) steps.push({el:pages[i],f:true});
  else       for(let i=cur;i>t;i--)   steps.push({el:pages[i],f:false});
  let s=0;
  const run=()=>{
    if(s>=steps.length){ cur=t; nav(); flipping=false; return; }
    const {el,f}=steps[s++];
    f?el.classList.add('flipped'):el.classList.remove('flipped');
    setTimeout(run, steps.length===1?0:115);
  };
  run();
}
function nextPage(){ if(!flipping) go(cur+1); }
function prevPage(){ if(!flipping) go(cur-1); }

document.addEventListener('keydown',e=>{
  if(!open)return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextPage();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   prevPage();
});
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!open)return;
  const dx=e.changedTouches[0].clientX-tx;
  if(dx<-44) nextPage();
  if(dx> 44) prevPage();
});

// ══════════════════════════════════════════════
// FRASES
// ══════════════════════════════════════════════
function openModal(){
  ['iq','ia','ib'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mo').classList.add('on');
}
function closeModal(){ document.getElementById('mo').classList.remove('on'); }

function saveQuote(){
  const q=document.getElementById('iq').value.trim();
  const a=document.getElementById('ia').value.trim();
  const b=document.getElementById('ib').value.trim();
  if(!q){document.getElementById('iq').focus();return;}
  const arr=loadQ();
  arr.push({q,a,s:b||'Nuestro libro',t:Date.now()});
  saveQ(arr); closeModal(); build();
  setTimeout(()=>go(pages.length-1),350);
  toast('✦ Frase guardada en el libro 💖'); hearts();
}

let pdIdx=-1;
function confirmDel(i){
  pdIdx=i;
  const q=loadQ()[i];
  document.getElementById('cp').textContent=q?`"${q.q.slice(0,55)}${q.q.length>55?'...':''}"`:'';
  document.getElementById('co').classList.add('on');
}
function closeConfirm(){ document.getElementById('co').classList.remove('on'); pdIdx=-1; }
function deleteQuote(){
  if(pdIdx<0)return;
  const arr=loadQ(); arr.splice(pdIdx,1); saveQ(arr); closeConfirm();
  const ni=Math.min(cur,FIXED.length+arr.length-1);
  cur=-1; build();
  for(let i=0;i<=ni;i++) pages[i]?.classList.add('flipped');
  cur=ni; nav(); toast('Frase eliminada');
}

document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('co').addEventListener('click',function(e){if(e.target===this)closeConfirm();});

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}
function hearts(){
  ['💖','💗','💕','🌹','✨'].forEach((e,i)=>setTimeout(()=>{
    const el=document.createElement('div'); el.className='fh';
    el.textContent=e; el.style.left=(18+Math.random()*64)+'vw'; el.style.bottom='16vh';
    document.body.appendChild(el); setTimeout(()=>el.remove(),2100);
  },i*100));
}

// ══════════════════════════════════════════════
// MÚSICA — YouTube IFrame API
// ══════════════════════════════════════════════
let yt=null, ytReady=false, playing=false, tIdx=0;

// Cargar API
const s=document.createElement('script');
s.src='https://www.youtube.com/iframe_api';
document.head.appendChild(s);

function onYouTubeIframeAPIReady(){
  yt=new YT.Player('yt',{
    height:'1', width:'1',
    videoId: TRACKS[0].id,
    playerVars:{ autoplay:0, controls:0, disablekb:1, fs:0, iv_load_policy:3, modestbranding:1, rel:0, playsinline:1 },
    events:{
      onReady:()=>{ ytReady=true; },
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.PLAYING){ playing=true;  setIcon('⏸'); }
        if(e.data===YT.PlayerState.PAUSED)  { playing=false; setIcon('▷'); }
        if(e.data===YT.PlayerState.ENDED)    nextT();
      }
    }
  });
}

function setIcon(ic){ document.getElementById('pp').textContent=ic; }
function setTitle(i){ document.getElementById('mt').textContent='♩ '+TRACKS[i].title; }

function togglePlay(){
  if(!ytReady)return;
  playing ? yt.pauseVideo() : yt.playVideo();
}
function nextT(){
  tIdx=(tIdx+1)%TRACKS.length;
  if(ytReady){ yt.loadVideoById(TRACKS[tIdx].id); setTitle(tIdx); }
}
function prevT(){
  tIdx=(tIdx-1+TRACKS.length)%TRACKS.length;
  if(ytReady){ yt.loadVideoById(TRACKS[tIdx].id); setTitle(tIdx); }
}

// ══════════════════════════════════════════════
// CONTADOR
// ══════════════════════════════════════════════
function tick(){
  const d=new Date()-ANN; if(d<0)return;
  document.getElementById('days').textContent=Math.floor(d/86400000);
  const h=Math.floor((d%86400000)/3600000);
  const m=Math.floor((d%3600000)/60000);
  const sec=Math.floor((d%60000)/1000);
  document.getElementById('hms').textContent=
    `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(sec).padStart(2,'0')}s`;
}
document.getElementById('since').textContent=
  'Desde el '+ANN.toLocaleDateString('es-MX',{day:'numeric',month:'long',year:'numeric'})+' 💖';
setInterval(tick,1000); tick();

// ══════════════════════════════════════════════
// PARTÍCULAS
// ══════════════════════════════════════════════
const cv=document.getElementById('bg'), cx=cv.getContext('2d');
function rsz(){ cv.width=innerWidth; cv.height=innerHeight; }
window.addEventListener('resize',rsz); rsz();
let pts=[];
(function loop(){
  cx.clearRect(0,0,cv.width,cv.height);
  if(pts.length<14&&Math.random()<.065)
    pts.push({x:Math.random()*cv.width,y:cv.height+6,sy:-(Math.random()*.42+.16),o:.52});
  pts=pts.filter(p=>p.o>0);
  pts.forEach(p=>{ p.y+=p.sy; p.o-=.001;
    cx.fillStyle=`rgba(232,160,180,${p.o})`;
    cx.beginPath(); cx.arc(p.x,p.y,2,0,Math.PI*2); cx.fill();
  });
  requestAnimationFrame(loop);
})();

// INIT
build();
</script>
