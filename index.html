<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
  :root {
    --rose: #e8a0b4;
    --rose-deep: #c2678a;
    --rose-pale: #fdf0f5;
    --gold: #d4a76a;
    --gold-light: #f0d9b5;
    --ink: #3a2a35;
    --parchment: #fef9f2;
    --shadow: rgba(60,20,40,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #e91e8c22 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* PARTICLES */
  #particles-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* TITLE */
  .title-area {
    position: relative;
    z-index: 10;
    text-align: center;
    margin-bottom: 20px;
  }
  .title-area h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--rose-deep);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 12px rgba(194,103,138,0.3);
  }
  .title-area .subtitle {
    font-size: 0.95rem;
    color: var(--rose-deep);
    opacity: 0.7;
    font-style: italic;
    margin-top: 4px;
  }

  /* COUNTER */
  .counter-box {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,180,0.5);
    border-radius: 50px;
    padding: 8px 24px;
    margin-bottom: 18px;
    font-size: 0.9rem;
    color: var(--ink);
    text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .counter-box span { color: var(--rose-deep); font-weight: 700; font-family: 'Playfair Display', serif; }

  /* BOOK SCENE */
  .book-scene {
    position: relative;
    z-index: 10;
    perspective: 1800px;
    width: min(380px, 90vw);
    height: min(480px, 70vh);
  }

  .book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
  }

  /* BOOK SHADOW */
  .book::after {
    content: '';
    position: absolute;
    bottom: -24px;
    left: 10%;
    width: 80%;
    height: 30px;
    background: radial-gradient(ellipse, rgba(194,103,138,0.35) 0%, transparent 70%);
    filter: blur(6px);
  }

  /* SPINE */
  .book-spine {
    position: absolute;
    left: 0; top: 0;
    width: 28px;
    height: 100%;
    background: linear-gradient(180deg, var(--rose-deep) 0%, #a04e70 50%, var(--rose-deep) 100%);
    border-radius: 6px 0 0 6px;
    box-shadow: -3px 0 12px rgba(60,20,40,0.3);
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .spine-decoration {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 4px var(--gold);
  }

  /* PAGES STACK */
  .pages-stack {
    position: absolute;
    left: 28px; top: 4px;
    width: calc(100% - 32px);
    height: calc(100% - 8px);
    border-radius: 0 10px 10px 0;
    overflow: hidden;
    background: #f5e6ea;
    box-shadow: inset -3px 0 8px rgba(60,20,40,0.1);
  }

  /* INDIVIDUAL PAGE */
  .page {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--parchment);
    border-radius: 0 10px 10px 0;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    cursor: pointer;
    backface-visibility: hidden;
  }

  .page.flipped {
    transform: rotateY(-180deg);
  }

  /* PAGE FRONT & BACK */
  .page-front, .page-back {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    padding: 28px 24px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 0 10px 10px 0;
    backface-visibility: hidden;
  }
  .page-back {
    transform: rotateY(180deg);
    background: #fdf5f8;
  }

  /* PAGE CURL EFFECT */
  .page::before {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 32px 32px;
    border-color: transparent transparent rgba(232,160,180,0.25) transparent;
    transition: all 0.3s;
    z-index: 2;
  }
  .page:hover::before {
    border-width: 0 0 52px 52px;
    border-color: transparent transparent rgba(232,160,180,0.5) transparent;
  }

  /* PAGE LINES */
  .page-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      transparent,
      transparent 30px,
      rgba(232,160,180,0.12) 30px,
      rgba(232,160,180,0.12) 31px
    );
    border-radius: 0 10px 10px 0;
    pointer-events: none;
  }

  /* PAGE NUMBER */
  .page-number {
    position: absolute;
    bottom: 14px;
    font-size: 0.7rem;
    color: rgba(60,20,40,0.35);
    font-style: italic;
    letter-spacing: 0.1em;
  }
  .page-front .page-number { right: 18px; }
  .page-back .page-number { left: 18px; }

  /* PAGE CONTENT */
  .page-day {
    font-family: 'Playfair Display', serif;
    font-size: 0.75rem;
    color: var(--rose-deep);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.7;
  }
  .page-quote {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--ink);
    text-align: center;
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 16px;
  }
  .page-heart-deco {
    font-size: 1.4rem;
    animation: pulse 2s ease-in-out infinite;
  }
  .page-date-small {
    font-size: 0.7rem;
    color: rgba(60,20,40,0.4);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }
  .page-ornament {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto;
  }

  /* COVER */
  .book-cover {
    position: absolute;
    top: 0; left: 28px;
    width: calc(100% - 28px);
    height: 100%;
    background: linear-gradient(135deg, #f4b8cf 0%, #e8839f 40%, #c2678a 100%);
    border-radius: 0 12px 12px 0;
    z-index: 20;
    transform-origin: left center;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1.000);
    cursor: pointer;
    box-shadow: 6px 0 30px rgba(60,20,40,0.25);
  }
  .book-cover.open {
    transform: rotateY(-175deg);
    pointer-events: none;
  }
  .cover-inner {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 0 12px 12px 0;
    padding: 30px;
    background: linear-gradient(135deg, #f4b8cf 0%, #e8839f 40%, #c2678a 100%);
  }
  .cover-back {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fdf0f5;
    border-radius: 0 12px 12px 0;
    transform: rotateY(180deg);
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .cover-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    color: white;
    text-align: center;
    text-shadow: 0 2px 12px rgba(60,20,40,0.3);
    line-height: 1.3;
    font-style: italic;
  }
  .cover-hearts { font-size: 2rem; margin: 16px 0; animation: pulse 2.5s ease-in-out infinite; }
  .cover-subtitle {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.8);
    text-align: center;
    font-style: italic;
    margin-top: 8px;
  }
  .cover-border {
    position: absolute;
    inset: 12px;
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 0 8px 8px 0;
  }
  .cover-tap {
    position: absolute;
    bottom: 24px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    animation: blink 2s ease-in-out infinite;
    letter-spacing: 0.1em;
  }
  @keyframes blink { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* BACK COVER */
  .book-back-cover {
    position: absolute;
    top: 0; left: 28px;
    width: calc(100% - 28px);
    height: 100%;
    background: linear-gradient(135deg, #e8839f 0%, #c2678a 100%);
    border-radius: 0 12px 12px 0;
    z-index: 1;
  }

  /* NAV BUTTONS */
  .nav-area {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 22px;
  }
  .nav-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 2px solid rgba(194,103,138,0.5);
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    color: var(--rose-deep);
    font-size: 1.3rem;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .nav-btn:hover { background: var(--rose-deep); color: white; border-color: var(--rose-deep); transform: scale(1.08); }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .page-indicator {
    font-family: 'Playfair Display', serif;
    font-size: 0.85rem;
    color: var(--ink);
    opacity: 0.65;
    min-width: 80px;
    text-align: center;
  }

  /* TODAY BADGE */
  .today-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--rose-deep);
    color: white;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 10px;
    animation: pulse 2s ease-in-out infinite;
  }

  /* CONFETTI BURST */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 100;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* RIPPLE */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(232,160,180,0.4);
    transform: scale(0);
    animation: ripple-out 0.6s linear forwards;
    pointer-events: none;
  }
  @keyframes ripple-out {
    to { transform: scale(4); opacity: 0; }
  }

  /* SPARKLE */
  .sparkle {
    position: fixed;
    width: 6px; height: 6px;
    background: var(--gold);
    clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
    pointer-events: none;
    z-index: 99;
    animation: sparkle-anim 1s ease-out forwards;
  }
  @keyframes sparkle-anim {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
    100% { transform: scale(0) rotate(360deg); opacity: 0; }
  }

  /* FLOATING HEARTS */
  .float-heart {
    position: fixed;
    font-size: 1.2rem;
    pointer-events: none;
    z-index: 99;
    animation: float-up 3s ease-out forwards;
  }
  @keyframes float-up {
    0% { transform: translateY(0) scale(1); opacity: 0.9; }
    100% { transform: translateY(-70vh) scale(0.3); opacity: 0; }
  }

  /* PAGE FLIP SOUND VISUAL */
  .flip-indicator {
    position: fixed;
    bottom: 30px; right: 30px;
    font-size: 0.75rem;
    color: var(--rose-deep);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
    font-style: italic;
  }
  .flip-indicator.show { opacity: 1; }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: rgba(60,20,40,0.85);
    color: white;
    font-size: 0.78rem;
    padding: 8px 14px;
    border-radius: 20px;
    pointer-events: none;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }
  .tooltip.show { opacity: 1; }

  /* MOBILE */
  @media (max-width: 500px) {
    .book-scene { height: 60vh; }
  }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="title-area">
  <h1>Nuestro Libro de Amor</h1>
  <p class="subtitle">Una página por cada día juntos</p>
</div>

<div class="counter-box" id="counter-box">
  Llevamos <span id="days-count">0</span> días juntos · <span id="hms">00h 00m 00s</span>
</div>

<div class="book-scene">
  <div class="book" id="book">
    <!-- Back cover -->
    <div class="book-back-cover"></div>

    <!-- Spine -->
    <div class="book-spine">
      <div class="spine-decoration"></div>
      <div class="spine-decoration"></div>
      <div class="spine-decoration"></div>

    <!-- Pages stack -->
    <div class="pages-stack" id="pages-stack"></div>

    <!-- Front cover -->
    <div class="book-cover" id="book-cover" onclick="openBook()">

    </div>
  </div>
</div>

<div class="nav-area" id="nav-area" style="display:none">
  <button class="nav-btn" id="prev-btn" onclick="prevPage()" title="Página anterior">‹</button>
  <div class="page-indicator" id="page-indicator">1 / 1</div>
  <button class="nav-btn" id="next-btn" onclick="nextPage()" title="Página siguiente">›</button>

<div class="flip-indicator" id="flip-indicator">pasando página...</div>
<div class="tooltip" id="tooltip"></div>

  { text: "Eres mi persona, mi amor, mi todo.", emoji: "💖" },
  { text: "Tu amor es la constante más hermosa de mi vida y de mi historia.", emoji: "📖" },
  { text: "Gracias por amarme. Hoy, mañana, siempre.", emoji: "♾️" },
  { text: "Eres mi favorito en todas las formas posibles.", emoji: "🌟" },
  { text: "Tu amor es lo que hace brillar incluso los días más grises.", emoji: "🌤️" },
  { text: "Contigo descubrí lo que es amar de verdad, sin miedo y sin límites.", emoji: "❤️‍🔥" },
  { text: "Eres la persona más importante que ha entrado a mi vida.", emoji: "💫" },
  { text: "Tu amor es lo más bonito que tengo.", emoji: "🌹" },
  { text: "Gracias por este año increíble. Pronto cumplimos nuestro primer aniversario juntos.", emoji: "🎉" },
  // ═════════════════════════════════════════════════════════════════
  // 🎊 PÁGINA ESPECIAL DE ANIVERSARIO — Día 365 (13 de diciembre 2025)
  // Esta página aparece exactamente en su primer aniversario
  // ═════════════════════════════════════════════════════════════════
  { text: "¡UN AÑO JUNTOS! 🎊 Hace exactamente 365 días empezó la mejor historia de mi vida. Gracias por cada día, cada sonrisa, cada abrazo. Te amo hoy más que nunca, y mañana te amaré más que hoy. Feliz primer aniversario, amor mío. ♾️", emoji: "🎊", isAnniversary: true },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let isOpen = false;
let currentPage = 0; // 0-indexed, which page pair we're on
let totalDays = 0;
let pages = []; // DOM page elements
let flipping = false;

// ═══════════════════════════════════════════
// DAYS CALC
// ═══════════════════════════════════════════
function getDaysDiff() {
  const now = new Date();
  const diff = now - ANNIVERSARY;
  return Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
}

function getPageFrase(dayIndex) {
  return frases[dayIndex % frases.length];
}

function formatDate(dayIndex) {
  const d = new Date(ANNIVERSARY);
  d.setDate(d.getDate() + dayIndex);
  return d.toLocaleDateString('es-MX', { day: 'numeric', month: 'long', year: 'numeric' });
}

// ═══════════════════════════════════════════
// BUILD PAGES
// ═══════════════════════════════════════════
function buildPages() {
  totalDays = getDaysDiff();
  const stack = document.getElementById('pages-stack');
  stack.innerHTML = '';
  pages = [];

  const pageCount = Math.max(1, totalDays + 1);

  for (let i = pageCount - 1; i >= 0; i--) {
    const isToday = i === totalDays;
    // Day 365 = anniversary (index 365 in frases)
    const isAnniversary = i === 365;
    const frase = frases[Math.min(i, frases.length - 1)];
    const dateStr = formatDate(i);

    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = pageCount - i;
    page.dataset.index = i;

    const dayLabel = i === 0 ? 'Día 1 · El primero' : isAnniversary ? '🎊 ¡1 Año Juntos!' : `Día ${i + 1}`;

    if (isAnniversary) {
      page.innerHTML = `
        <div class="page-front" style="background:linear-gradient(135deg,#fff0f8,#fde8f0);position:relative;overflow:hidden;">
          <div style="position:absolute;inset:0;background:repeating-linear-gradient(transparent,transparent 30px,rgba(232,160,180,0.12) 30px,rgba(232,160,180,0.12) 31px);border-radius:0 10px 10px 0;pointer-events:none;"></div>
          <div class="today-badge" style="background:linear-gradient(90deg,#c2678a,#d4a76a);font-size:0.8rem;padding:6px 18px;">🎊 ¡Feliz Aniversario! 🎊</div>
          <div class="page-day" style="font-size:0.9rem;color:var(--gold);">✦ Un año de amor ✦</div>
          <div class="page-ornament" style="background:linear-gradient(90deg,transparent,var(--gold),transparent);"></div>
          <div class="page-quote" style="font-size:1rem;line-height:1.65;">${frase.text}</div>
          <div class="page-heart-deco" style="font-size:2rem;">🎊💖🎊</div>
          <div class="page-date-small">${dateStr}</div>
          <div class="page-ornament" style="background:linear-gradient(90deg,transparent,var(--gold),transparent);"></div>
          <div class="page-number" style="right:18px;color:var(--gold);">Pág. 365</div>
        </div>
        <div class="page-back" style="background:linear-gradient(135deg,#fdf5f8,#fff0f8);">
          <div class="page-ornament"></div>
          <div style="font-size:2rem;margin-bottom:8px;">💍</div>
          <div class="page-quote" style="font-size:0.95rem;font-style:italic;color:var(--rose-deep);">Gracias por este primer año.<br>El mejor está por venir. 💖</div>
          <div class="page-ornament"></div>
          <div class="page-number" style="left:18px;">Pág. 366</div>
        </div>
      `;
    } else {
      page.innerHTML = `
        <div class="page-front">
          ${isToday ? '<div class="today-badge">✦ Hoy ✦</div>' : ''}
          <div class="page-day">${dayLabel}</div>
          <div class="page-ornament"></div>
          <div class="page-quote">${frase.text}</div>
          <div class="page-heart-deco">${frase.emoji}</div>
          <div class="page-date-small">${dateStr}</div>
          <div class="page-ornament"></div>
          <div class="page-number">Pág. ${(i + 1) * 2 - 1}</div>
        </div>
        <div class="page-back">
          <div class="page-day" style="opacity:0.5">~</div>
          <div class="page-ornament"></div>
          <div class="page-quote" style="font-size:1.5rem">${frase.emoji}</div>
          <div class="page-date-small" style="margin-top:6px;font-style:italic">Con amor, siempre</div>
          <div class="page-ornament"></div>
          <div class="page-number">Pág. ${(i + 1) * 2}</div>
        </div>
      `;
    }

    stack.appendChild(page);
    pages.unshift(page);
  }
}

// ═══════════════════════════════════════════
// PAGE FLIP LOGIC
// ═══════════════════════════════════════════
function updatePageIndicator() {
  const total = pages.length;
  const cur = total - currentPage; // pages left to flip
  document.getElementById('page-indicator').textContent = `${currentPage + 1} / ${total}`;
  document.getElementById('prev-btn').disabled = currentPage <= 0;
  document.getElementById('next-btn').disabled = currentPage >= total - 1;
}

function goToPage(index) {
  if (flipping) return;
  if (index < 0 || index >= pages.length) return;

  flipping = true;
  const indicator = document.getElementById('flip-indicator');
  indicator.classList.add('show');

  if (index > currentPage) {
    // flip forward: flip pages from currentPage up to index
    const doFlip = (i) => {
      if (i > index) {
        currentPage = index;
        updatePageIndicator();
        flipping = false;
        indicator.classList.remove('show');
        spawnSparkles();
        return;
      }
      pages[i].classList.add('flipped');
      setTimeout(() => doFlip(i + 1), 180);
    };
    doFlip(currentPage);
  } else {
    // flip backward
    const doUnflip = (i) => {
      if (i < index) {
        currentPage = index;
        updatePageIndicator();
        flipping = false;
        indicator.classList.remove('show');
        spawnSparkles();
        return;
      }
      pages[i].classList.remove('flipped');
      setTimeout(() => doUnflip(i - 1), 180);
    };
    doUnflip(currentPage - 1);
  }
}

function nextPage() {
  if (currentPage < pages.length - 1) {
    spawnFloatingHeart();
    goToPage(currentPage + 1);
  }
}

function prevPage() {
  if (currentPage > 0) {
    goToPage(currentPage - 1);
  }
}

// ═══════════════════════════════════════════
// OPEN BOOK
// ═══════════════════════════════════════════
let musicPlaying = false;
let scWidget = null;

function toggleMusic() {
  if (!scWidget) scWidget = SC.Widget(document.getElementById('sc-widget'));
  if (musicPlaying) {
    scWidget.pause();
    document.getElementById('music-btn').textContent = '🔇';
    musicPlaying = false;
  } else {
    scWidget.play();
    document.getElementById('music-btn').textContent = '🎵';
    musicPlaying = true;
  }
}

function openBook() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('book-cover').classList.add('open');
  document.getElementById('nav-area').style.display = 'flex';

  // Mostrar botón de música
  const btn = document.getElementById('music-btn');
  btn.style.display = 'flex';

  // Intentar reproducir música automáticamente al abrir
  setTimeout(() => {
    try {
      scWidget = SC.Widget(document.getElementById('sc-widget'));
      scWidget.play();
      musicPlaying = true;
    } catch(e) {}
  }, 800);

  setTimeout(() => {
    goToPage(totalDays);
    spawnConfetti();
  }, 1300);
}

// ═══════════════════════════════════════════
// COUNTER
// ═══════════════════════════════════════════
function updateCounter() {
  const now = new Date();
  const diff = now - ANNIVERSARY;
  if (diff < 0) {
    document.getElementById('days-count').textContent = '0';
    document.getElementById('hms').textContent = '00h 00m 00s';
    return;
  }
  const days = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('days-count').textContent = days;
  document.getElementById('hms').textContent =
    `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

// ═══════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createParticle() {
  return {
    x: Math.random() * canvas.width,
    y: canvas.height + 10,
    size: Math.random() * 7 + 3,
    speedX: (Math.random() - 0.5) * 0.8,
    speedY: -(Math.random() * 1.2 + 0.4),
    opacity: Math.random() * 0.5 + 0.3,
    type: Math.random() > 0.5 ? 'heart' : 'dot',
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.03,
  };
}

function drawHeart(ctx, x, y, size, opacity) {
  ctx.save();
  ctx.globalAlpha = opacity;
  ctx.fillStyle = `hsl(${330 + Math.random() * 30}, 80%, 75%)`;
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.3);
  ctx.bezierCurveTo(size * 0.5, -size, size * 1.2, -size * 0.2, 0, size * 0.6);
  ctx.bezierCurveTo(-size * 1.2, -size * 0.2, -size * 0.5, -size, 0, -size * 0.3);
  ctx.fill();
  ctx.restore();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (particles.length < 10 && Math.random() < 0.08) {
    particles.push(createParticle());
  }

  particles = particles.filter(p => p.opacity > 0.01 && p.y > -20);

  for (const p of particles) {
    p.x += p.speedX;
    p.y += p.speedY;
    p.opacity -= 0.004;

    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = '#e8a0b4';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(animateParticles);
}

// ═══════════════════════════════════════════
// EFFECTS
// ═══════════════════════════════════════════
function spawnConfetti() {
  const colors = ['#e8a0b4', '#c2678a', '#d4a76a', '#f4e0ea', '#f48fb1'];
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.transform = `rotate(${Math.random() * 360}deg)`;
      el.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 40);
  }
}

function spawnSparkles() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.style.left = (cx + (Math.random() - 0.5) * 200) + 'px';
    el.style.top = (cy + (Math.random() - 0.5) * 200) + 'px';
    el.style.animationDelay = (i * 80) + 'ms';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

function spawnFloatingHeart() {
  const hearts = ['💖', '💗', '💕', '💓', '🌹', '✨'];
  const el = document.createElement('div');
  el.className = 'float-heart';
  el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
  el.style.left = (30 + Math.random() * 40) + 'vw';
  el.style.bottom = '20vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!isOpen) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', (e) => {
  if (!isOpen) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -50) nextPage();
  if (dx > 50) prevPage();
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
buildPages();
updateCounter();
setInterval(updateCounter, 1000);
animateParticles();
</script>
