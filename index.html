<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Libro Eterno 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://w.soundcloud.com/player/api.js"></script>
<style>
  :root {
    --rose-deep: #c2678a;
    --rose-mid: #e8839f;
    --gold: #d4a76a;
    --ink: #3a2a35;
    --parchment: #fef9f2;
    --shadow: rgba(60,20,40,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #e91e8c22 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; overflow: hidden;
  }

  /* RESPONSIVIDAD PARA CELULAR */
  @media (max-width: 500px) {
    .book-scene { width: 90vw !important; height: 60vh !important; }
    .quote { font-size: 1rem !important; }
    .counter-box { font-size: 0.7rem !important; padding: 8px 15px !important; }
    .music-ui { scale: 0.8; bottom: 10px !important; right: 10px !important; }
    .add-btn { scale: 0.8; bottom: 10px !important; left: 10px !important; }
  }

  #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  .counter-box {
    position: relative; z-index: 10;
    background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,180,0.5); border-radius: 50px;
    padding: 8px 24px; margin-bottom: 18px; text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
  }
  .counter-box span { color: var(--rose-deep); font-weight: 700; font-family: 'Playfair Display', serif; }

  .book-scene {
    position: relative; z-index: 10; perspective: 2000px;
    width: min(380px, 90vw); height: min(480px, 70vh);
  }

  .book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

  .book-spine {
    position: absolute; left: 0; top: 0; width: 30px; height: 100%;
    background: linear-gradient(180deg, var(--rose-deep) 0%, #a04e70 50%, var(--rose-deep) 100%);
    border-radius: 6px 0 0 6px; z-index: 200;
  }

  .page {
    position: absolute; top: 5px; left: 30px;
    width: calc(100% - 35px); height: calc(100% - 10px);
    background: var(--parchment); border-radius: 0 10px 10px 0;
    transform-origin: left center;
    transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
    transform-style: preserve-3d; backface-visibility: hidden;
    box-shadow: inset 3px 0 10px rgba(0,0,0,0.05), 2px 2px 5px rgba(0,0,0,0.1);
  }

  .page.flipped { transform: rotateY(-180deg); z-index: 0 !important; }

  .page-content {
    width: 100%; height: 100%; padding: 30px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  }

  .cover-page {
    background: linear-gradient(135deg, #f4b8cf 0%, #e8839f 40%, #c2678a 100%) !important;
    z-index: 150; color: white; border-radius: 0 12px 12px 0; cursor: pointer;
  }

  .quote { font-size: 1.15rem; font-style: italic; color: var(--ink); line-height: 1.5; }
  .author { font-size: 0.75rem; color: var(--rose-deep); text-transform: uppercase; margin-top: 10px; font-weight: bold; }

  /* UI MÚSICA */
  .music-ui {
    position: fixed; bottom: 25px; right: 25px; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    background: white; padding: 8px 16px; border-radius: 40px;
    border: 2px solid var(--rose-deep); box-shadow: 0 4px 15px var(--shadow);
  }
  .m-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--rose-deep); }
  #track-name { font-size: 0.6rem; color: var(--rose-deep); font-weight: bold; min-width: 80px; text-align: center; }

  .add-btn {
    position: fixed; bottom: 25px; left: 25px; z-index: 1000;
    width: 45px; height: 45px; border-radius: 50%;
    background: white; border: 2px solid var(--rose-deep); color: var(--rose-deep);
    font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="counter-box">
  <div>Llevamos <span id="days-count">0</span> días juntos · <span id="hms">00h 00m 00s</span></div>
  <div id="since-line" style="font-size: 0.7rem; color: var(--rose-deep); opacity: 0.8;"></div>
</div>

<div class="book-scene">
  <div class="book" id="book">
    <div class="book-spine"></div>
    <div id="pages-container"></div>
    <div class="page cover-page" id="cover" onclick="openBook()">
      <div class="page-content">
        <h2 style="font-family:'Playfair Display'; font-size: 2rem;">Para Ti</h2>
        <p style="margin-top: 10px;">Nuestra historia</p>
        <p style="margin-top: 30px; font-size: 0.6rem; letter-spacing: 2px;">✦ TOCA PARA ABRIR ✦</p>
      </div>
    </div>
  </div>
</div>

<div id="nav-bar" style="display:none; margin-top: 20px; gap: 15px; display: flex; z-index: 20;">
  <button onclick="prevPage()" style="background:white; border:1px solid var(--rose-deep); border-radius:20px; padding:5px 15px; color:var(--rose-deep); cursor:pointer;">←</button>
  <span id="page-indicator" style="color:var(--rose-deep)">1 / 1</span>
  <button onclick="nextPage()" style="background:white; border:1px solid var(--rose-deep); border-radius:20px; padding:5px 15px; color:var(--rose-deep); cursor:pointer;">→</button>
</div>

<iframe id="sc-widget" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/114946051&auto_play=false" style="display:none"></iframe>

<div class="music-ui">
  <button class="m-btn" onclick="changeTrack(-1)">⏮</button>
  <button class="m-btn" id="play-pause" onclick="toggleMusic()">▷</button>
  <button class="m-btn" onclick="changeTrack(1)">⏭</button>
  <div id="track-name">THE REASON</div>
</div>

<button class="add-btn" onclick="saveNewQuote()">+</button>

<script>
const ANNIVERSARY = new Date("2024-12-13T00:00:00");
const fixedPages = [
  { quote: "No importa lo que pase mañana, te quiero hoy.", source: "Nuestro Camino Eterno" },
  { quote: "¿Me amas? ¿Real o no real? —Real.", source: "Los Juegos del Hambre" },
  { quote: "Luke era el sol y yo la luna, y en un mundo perfecto, el eclipse sería eterno.", source: "Boulevard" },
  { quote: "Rompe mi corazón si quieres, pero no te vayas. Nunca lo hagas.", source: "Boulevard" },
  { quote: "Ahora sé que la droga más fuerte de un ser humano es otro ser humano.", source: "Boulevard" }
];

let currentIdx = -1;
let allPages = [];
let isOpen = false;

// MÚSICA - API DE SOUNDCLOUD
const tracks = [
  { name: "THE REASON", url: "https://api.soundcloud.com/tracks/114946051" },
  { name: "WONDERWALL", url: "https://api.soundcloud.com/tracks/10292723" }
];
let currentTrack = 0;
let widget = SC.Widget(document.getElementById('sc-widget'));
let isPlaying = false;

function buildPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = ''; allPages = [];
  fixedPages.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = fixedPages.length - i;
    page.innerHTML = `<div class="page-content"><p class="quote">"${q.quote}"</p><span class="author">${q.source}</span></div>`;
    container.appendChild(page);
    allPages.push(page);
  });
}

function openBook() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('cover').classList.add('flipped');
  
  // SOLUCIÓN MÚSICA: Esperar un momento para asegurar que el Widget responda
  setTimeout(() => {
    widget.play();
    isPlaying = true;
    document.getElementById('play-pause').innerText = "⏸";
  }, 500);

  setTimeout(() => { goToPage(0); }, 800);
}

function toggleMusic() {
  widget.toggle();
  isPlaying = !isPlaying;
  document.getElementById('play-pause').innerText = isPlaying ? "⏸" : "▷";
}

function changeTrack(dir) {
  currentTrack = (currentTrack + dir + tracks.length) % tracks.length;
  widget.load(tracks[currentTrack].url, { auto_play: true });
  document.getElementById('track-name').innerText = tracks[currentTrack].name;
  isPlaying = true;
  document.getElementById('play-pause').innerText = "⏸";
}

function goToPage(idx) {
  if (idx < 0 || idx >= allPages.length) return;
  if (idx > currentIdx) {
    for (let i = currentIdx + 1; i <= idx; i++) allPages[i].classList.add('flipped');
  } else {
    for (let i = currentIdx; i > idx; i--) allPages[i].classList.remove('flipped');
  }
  currentIdx = idx;
  document.getElementById('page-indicator').innerText = `${currentIdx + 1} / ${allPages.length}`;
}

function nextPage() { goToPage(currentIdx + 1); }
function prevPage() { goToPage(currentIdx - 1); }

function updateCounter() {
  const diff = new Date() - ANNIVERSARY;
  const days = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById('days-count').textContent = days;
  document.getElementById('hms').textContent = `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}
setInterval(updateCounter, 1000); updateCounter();
document.getElementById('since-line').textContent = `Desde el ${ANNIVERSARY.toLocaleDateString()} 💖`;

// PARTÍCULAS
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
let particles = [];
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (particles.length < 15 && Math.random() < 0.05) particles.push({ x: Math.random() * canvas.width, y: canvas.height + 10, speedY: -(Math.random() * 0.4 + 0.2), opacity: 0.5 });
  particles.forEach((p, i) => {
    p.y += p.speedY; p.opacity -= 0.001;
    ctx.fillStyle = `rgba(232,160,180,${p.opacity})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
    if (p.opacity <= 0) particles.splice(i, 1);
  });
  requestAnimationFrame(animate);
}
animate(); buildPages();
</script>
</body>
</html>
