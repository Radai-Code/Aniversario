<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestro Libro Eterno 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose-deep: #c2678a;
    --rose-mid: #e8839f;
    --rose-pale: #fce4ec;
    --gold: #d4a76a;
    --ink: #3a2a35;
    --parchment: #fef9f2;
    --shadow: rgba(60,20,40,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #e91e8c22 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; overflow: hidden;
  }

  /* ── PARTÍCULAS ── */
  #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

  /* ── CONTADOR ── */
  .counter-box {
    position: relative; z-index: 10;
    background: rgba(255,255,255,0.55); backdrop-filter: blur(12px);
    border: 1px solid rgba(232,160,180,0.5); border-radius: 50px;
    padding: 8px 24px; margin-bottom: 18px;
    font-size: 0.85rem; color: var(--ink); text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
    animation: fadeDown 0.8s ease both;
  }
  .counter-box span { color: var(--rose-deep); font-weight: 700; font-family: 'Playfair Display', serif; }
  .counter-since {
    font-size: 0.7rem; color: var(--rose-deep); opacity: 0.7;
    margin-top: 2px; font-style: italic;
  }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:translateY(0); } }

  /* ── LIBRO ── */
  .book-scene {
    position: relative; z-index: 10; perspective: 2000px;
    width: min(380px, 90vw); height: min(480px, 70vh);
    animation: fadeUp 0.9s 0.2s ease both;
  }

  .book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

  /* Sombra del libro */
  .book::after {
    content: ''; position: absolute; bottom: -18px; left: 8%;
    width: 84%; height: 20px;
    background: radial-gradient(ellipse, rgba(194,103,138,0.3) 0%, transparent 70%);
    filter: blur(5px);
  }

  .book-spine {
    position: absolute; left: 0; top: 0; width: 30px; height: 100%;
    background: linear-gradient(180deg, var(--rose-deep) 0%, #a04e70 50%, var(--rose-deep) 100%);
    border-radius: 6px 0 0 6px; z-index: 200;
    box-shadow: -2px 0 8px rgba(60,20,40,0.25);
  }
  .spine-dot {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
  }

  /* ── PÁGINAS ── */
  .page {
    position: absolute; top: 5px; left: 30px;
    width: calc(100% - 35px); height: calc(100% - 10px);
    background: var(--parchment); border-radius: 0 10px 10px 0;
    transform-origin: left center;
    transition: transform 0.85s cubic-bezier(0.645, 0.045, 0.355, 1);
    transform-style: preserve-3d; backface-visibility: hidden;
    box-shadow: inset 3px 0 10px rgba(0,0,0,0.05), 2px 2px 8px rgba(0,0,0,0.12);
  }

  /* Líneas de página */
  .page::after {
    content: ''; position: absolute; inset: 0; border-radius: 0 10px 10px 0; pointer-events: none;
    background: repeating-linear-gradient(transparent, transparent 32px, rgba(232,160,180,0.1) 32px, rgba(232,160,180,0.1) 33px);
  }

  /* Hover curl */
  .page:not(.cover-page)::before {
    content: ''; position: absolute; bottom: 0; right: 0;
    width: 0; height: 0; border-style: solid;
    border-width: 0 0 24px 24px;
    border-color: transparent transparent rgba(232,160,180,0.2) transparent;
    transition: border-width 0.3s;
    z-index: 3;
  }
  .page:not(.cover-page):hover::before {
    border-width: 0 0 42px 42px;
    border-color: transparent transparent rgba(232,160,180,0.45) transparent;
  }

  .page.flipped { transform: rotateY(-180deg); }

  .page-content {
    position: absolute; inset: 0; padding: 30px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; backface-visibility: hidden; border-radius: 0 10px 10px 0;
  }
  .page-back-content {
    position: absolute; inset: 0; padding: 30px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; backface-visibility: hidden; border-radius: 0 10px 10px 0;
    transform: rotateY(180deg);
    background: #fdf5f8;
  }

  .ornament { width: 50px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 10px auto; }
  .quote { font-size: 1.15rem; font-style: italic; color: var(--ink); line-height: 1.55; margin: 8px 0; }
  .author { font-size: 0.72rem; color: var(--rose-deep); letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
  .page-num { position: absolute; bottom: 12px; font-size: 0.65rem; color: rgba(60,20,40,0.3); font-style: italic; }
  .page-num.right { right: 16px; }
  .page-num.left  { left: 16px; }

  /* Etiqueta "escrita por" en frases personalizadas */
  .custom-tag {
    font-size: 0.65rem; color: var(--rose-deep); opacity: 0.6;
    margin-top: 6px; font-style: italic;
  }
  .custom-date-tag {
    font-size: 0.62rem; color: rgba(60,20,40,0.35); margin-top: 4px;
  }

  /* ── PORTADA ── */
  .cover-page {
    background: linear-gradient(135deg, #f4b8cf 0%, #e8839f 40%, #c2678a 100%) !important;
    z-index: 150; color: white; border-radius: 0 12px 12px 0;
    cursor: pointer;
  }
  .cover-page .page-content { background: transparent; }
  .cover-border { position: absolute; inset: 14px; border: 1.5px solid rgba(255,255,255,0.35); border-radius: 0 8px 8px 0; }

  /* ── NAVEGACIÓN ── */
  .nav-bar {
    position: relative; z-index: 10; display: flex; align-items: center; gap: 14px;
    margin-top: 18px; animation: fadeUp 1s 0.4s ease both;
  }
  .nav-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(194,103,138,0.4);
    background: rgba(255,255,255,0.6); backdrop-filter: blur(8px);
    color: var(--rose-deep); font-size: 1.2rem; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px var(--shadow);
  }
  .nav-btn:hover { background: var(--rose-deep); color: white; transform: scale(1.08); }
  .nav-btn:disabled { opacity: 0.25; cursor: default; transform: none; }
  .page-indicator { font-size: 0.8rem; color: var(--ink); opacity: 0.55; min-width: 60px; text-align: center; font-family: 'Playfair Display', serif; }

  /* ── BOTÓN AGREGAR FRASE ── */
  .add-btn {
    position: fixed; bottom: 25px; left: 25px; z-index: 1000;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
    border: 2px solid var(--rose-deep); color: var(--rose-deep);
    font-size: 1.6rem; font-weight: 300; line-height: 1;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--shadow);
  }
  .add-btn:hover { background: var(--rose-deep); color: white; transform: scale(1.1); }

  /* ── MODAL AGREGAR FRASE ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(60,20,40,0.45);
    backdrop-filter: blur(6px); z-index: 2000;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--parchment); border-radius: 20px;
    padding: 32px 28px; width: min(420px, 100%);
    box-shadow: 0 20px 60px rgba(60,20,40,0.3);
    animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes modalIn { from { opacity:0; transform:scale(0.85) translateY(20px); } to { opacity:1; transform:scale(1) translateY(0); } }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--rose-deep); text-align: center; margin-bottom: 6px; }
  .modal p.modal-sub { font-size: 0.8rem; color: rgba(60,20,40,0.5); text-align: center; margin-bottom: 20px; font-style: italic; }
  .modal label { font-size: 0.78rem; color: var(--rose-deep); letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 5px; margin-top: 14px; }
  .modal input, .modal textarea {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1.5px solid rgba(232,160,180,0.5); background: white;
    font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink);
    resize: none; outline: none; transition: border 0.2s;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--rose-deep); }
  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
  .modal-save {
    flex: 1; padding: 11px; border-radius: 30px; border: none;
    background: var(--rose-deep); color: white; font-family: 'Playfair Display', serif;
    font-size: 1rem; cursor: pointer; transition: 0.2s;
  }
  .modal-save:hover { background: #a04e70; transform: scale(1.02); }
  .modal-cancel {
    padding: 11px 18px; border-radius: 30px;
    border: 2px solid rgba(194,103,138,0.4); background: transparent;
    color: var(--rose-deep); font-size: 0.9rem; cursor: pointer; transition: 0.2s;
  }
  .modal-cancel:hover { background: rgba(232,160,180,0.15); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--rose-deep); color: white; padding: 10px 24px;
    border-radius: 30px; font-size: 0.85rem; z-index: 3000;
    opacity: 0; transition: all 0.4s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MÚSICA ── */
  .music-ui {
    position: fixed; bottom: 25px; right: 25px; z-index: 1000;
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.9); padding: 8px 16px; border-radius: 40px;
    border: 2px solid var(--rose-deep); box-shadow: 0 4px 15px var(--shadow);
    backdrop-filter: blur(10px);
  }
  .m-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--rose-deep); transition: 0.2s; }
  .m-btn:hover { transform: scale(1.2); }
  #track-name { font-size: 0.6rem; color: var(--rose-deep); font-weight: bold; min-width: 80px; text-align: center; text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── CORAZONES FLOTANTES al guardar ── */
  .float-heart {
    position: fixed; font-size: 1.4rem; pointer-events: none; z-index: 99;
    animation: floatUp 2.5s ease-out forwards;
  }
  @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-60vh) scale(0.3);opacity:0} }

  /* ── PÁGINA ESPECIAL custom (badge) ── */
  .custom-badge {
    font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
    background: var(--rose-deep); color: white; padding: 3px 10px;
    border-radius: 20px; margin-bottom: 8px; display: inline-block;
  }

  /* ── BOTÓN ELIMINAR página ── */
  .delete-page-btn {
    position: absolute; top: 10px; right: 12px;
    background: rgba(255,255,255,0.8); border: 1.5px solid rgba(194,103,138,0.3);
    border-radius: 50%; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    color: var(--rose-deep); backdrop-filter: blur(4px);
    z-index: 5;
  }
  .delete-page-btn:hover { background: #fee; border-color: #c2678a; transform: scale(1.1); }

  /* ── MODAL CONFIRMAR ELIMINACIÓN ── */
  .confirm-overlay {
    position: fixed; inset: 0; background: rgba(60,20,40,0.5);
    backdrop-filter: blur(6px); z-index: 3000;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-box {
    background: var(--parchment); border-radius: 20px; padding: 28px 26px;
    width: min(340px, 100%); text-align: center;
    box-shadow: 0 20px 60px rgba(60,20,40,0.3);
    animation: modalIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .confirm-box h3 { font-family: 'Playfair Display', serif; color: var(--rose-deep); font-size: 1.2rem; margin-bottom: 8px; }
  .confirm-box p  { font-size: 0.85rem; color: rgba(60,20,40,0.6); font-style: italic; margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns   { display: flex; gap: 10px; justify-content: center; }
  .confirm-yes {
    padding: 10px 24px; border-radius: 30px; border: none;
    background: var(--rose-deep); color: white;
    font-family: 'Playfair Display', serif; font-size: 0.95rem; cursor: pointer; transition: 0.2s;
  }
  .confirm-yes:hover { background: #a04e70; }
  .confirm-no {
    padding: 10px 20px; border-radius: 30px;
    border: 2px solid rgba(194,103,138,0.4); background: transparent;
    color: var(--rose-deep); font-size: 0.9rem; cursor: pointer; transition: 0.2s;
  }
  .confirm-no:hover { background: rgba(232,160,180,0.15); }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- CONTADOR -->
<div class="counter-box">
  <div>Llevamos <span id="days-count">0</span> días juntos · <span id="hms">00h 00m 00s</span></div>
  <div class="counter-since" id="since-line"></div>
</div>

<!-- LIBRO -->
<div class="book-scene">
  <div class="book" id="book">
    <div class="book-spine">
      <div class="spine-dot" style="top:20%"></div>
      <div class="spine-dot" style="top:50%"></div>
      <div class="spine-dot" style="top:80%"></div>
    </div>

    <!-- Las páginas fijas se insertan aquí por JS -->
    <div id="pages-container"></div>

    <!-- PORTADA (siempre encima) -->
    <div class="page cover-page" id="cover" onclick="openBook()" style="z-index:150;">
      <div class="cover-border"></div>
      <div class="page-content">
        <div style="font-size:2rem;margin-bottom:12px;animation:pulse 2.5s ease-in-out infinite">💖</div>
        <h2 style="font-family:'Playfair Display';font-size:2rem;color:white;font-style:italic;text-shadow:0 2px 8px rgba(60,20,40,0.3)">Para Ti</h2>
        <p style="margin-top:8px;font-style:italic;color:rgba(255,255,255,0.85);font-size:0.95rem;">Nuestra historia en cada página</p>
        <div style="margin-top:30px;font-size:0.65rem;letter-spacing:3px;color:rgba(255,255,255,0.7);animation:blink 2s ease-in-out infinite">✦ TOCA PARA ABRIR ✦</div>
      </div>
    </div>
  </div>
</div>

<!-- NAVEGACIÓN -->
<div class="nav-bar" id="nav-bar" style="display:none">
  <button class="nav-btn" id="btn-prev" onclick="prevPage()" title="Página anterior">←</button>
  <div class="page-indicator" id="page-indicator">1 / 1</div>
  <button class="nav-btn" id="btn-next" onclick="nextPage()" title="Página siguiente">→</button>
</div>

<!-- BOTÓN AGREGAR FRASE -->
<button class="add-btn" id="add-btn" title="Agregar frase al libro" onclick="openModal()" style="display:none">+</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>✦ Escribir en el libro</h3>
    <p class="modal-sub">Tu frase quedará guardada para siempre en estas páginas</p>
    <label>Tu frase o mensaje</label>
    <textarea id="inp-quote" rows="3" placeholder='"Lo que siento por ti no tiene nombre..."'></textarea>
    <label>De parte de (tu nombre)</label>
    <input id="inp-author" type="text" placeholder="Tu nombre">
    <label>Libro o fuente <span style="opacity:0.5;font-size:0.7rem">(opcional)</span></label>
    <input id="inp-book" type="text" placeholder="Ej: Mi corazón, Nuestro diario...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-save" onclick="saveQuote()">Guardar en el libro 💖</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-box">
    <h3>¿Eliminar esta frase?</h3>
    <p id="confirm-preview"></p>
    <div class="confirm-btns">
      <button class="confirm-no"  onclick="closeConfirm()">Cancelar</button>
      <button class="confirm-yes" onclick="deleteQuote()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✦ Frase guardada en el libro 💖</div>

<!-- SPOTIFY -->
<iframe id="spotify-player"
  src="https://open.spotify.com/embed/playlist/5gvxyfrpTOLmHdC8VCb4Iw?utm_source=generator&theme=0"
  style="position:fixed;bottom:-500px;left:0;width:1px;height:1px;opacity:0;pointer-events:none;"
  allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
  loading="lazy">
</iframe>

<div class="music-ui">
  <button class="m-btn" onclick="spotifyPrev()">⟨⟨</button>
  <button class="m-btn" id="play-pause" onclick="toggleMusic()">▷</button>
  <button class="m-btn" onclick="spotifyNext()">⟩⟩</button>
  <div id="track-name">♩ música</div>
</div>

<style>
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
@keyframes blink  { 0%,100%{opacity:0.5} 50%{opacity:1} }
</style>

<script>
// ════════════════════════════════════════════════════════
// PÁGINAS FIJAS del libro
// ════════════════════════════════════════════════════════
const fixedPages = [
  { quote: "No importa lo que pase mañana, te quiero hoy.", source: "Nuestro Camino Eterno" },
  { quote: "¿Me amas? ¿Real o no real? —Real.", source: "Los Juegos del Hambre" },
  { quote: "Eres lo único que me hace sentir seguro en este mundo.", source: "Los Juegos del Hambre" },
  { quote: "Ella no me necesita. Y yo... yo no puedo vivir sin ella.", source: "Los Juegos del Hambre" },
  { quote: "—Buenas noches, Liam. —Buenas noches, supernova.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "No quiero que me bajen la luna, quiero que alguien se siente a verla conmigo.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "Aprendí que el hogar no es un lugar, es una persona. Y mi hogar eres tú.", source: "Hasta que nos quedemos sin estrellas" },
  { quote: "Rompe mi corazón si quieres, pero no te vayas. Nunca lo hagas.", source: "Boulevard" },
  { quote: "Ahora sé que la droga más fuerte de un ser humano es otro ser humano.", source: "Boulevard" },
  { quote: "Luke era el sol y yo la luna, y en un mundo perfecto, el eclipse sería eterno.", source: "Boulevard" },
  { quote: "—Sí, me gusta —sonreí—. Tú me gustas.", source: "Boulevard" },
  { quote: "Si el mundo se acaba hoy, me gustaría que me encontrara a tu lado.", source: "Boulevard" },
];

// ════════════════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════════════════
const ANNIVERSARY = new Date("2024-12-13T00:00:00");
let allPages = [];   // todos los elementos .page (sin portada)
let currentIdx = -1; // -1 = portada visible
let isOpen = false;
let isFlipping = false;

// ════════════════════════════════════════════════════════
// CONSTRUIR PÁGINAS
// ════════════════════════════════════════════════════════
function buildPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  allPages = [];

  const customQuotes = loadCustomQuotes();
  const allQuotes = [...fixedPages, ...customQuotes];

  allQuotes.forEach((q, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = allQuotes.length - i;

    const isCustom = i >= fixedPages.length;
    const dateStr = isCustom && q.savedAt
      ? new Date(q.savedAt).toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' })
      : '';

    page.innerHTML = `
      <div class="page-content">
        ${isCustom ? `<div class="custom-badge">✦ Escrito por nosotros ✦</div>` : ''}
        <div class="ornament"></div>
        <p class="quote">"${q.quote}"</p>
        <div class="ornament"></div>
        <span class="author">${q.source || q.book || ''}</span>
        ${isCustom && q.author ? `<div class="custom-tag">— ${q.author}</div>` : ''}
        ${isCustom && dateStr ? `<div class="custom-date-tag">${dateStr}</div>` : ''}
        ${isCustom ? `<button class="delete-page-btn" onclick="confirmDelete(${i - fixedPages.length})" title="Eliminar esta frase">×</button>` : ''}
        <div class="page-num right">Pág. ${(i+1)*2-1}</div>
      </div>
      <div class="page-back-content">
        <div class="ornament"></div>
        <div style="font-size:1.6rem;margin:8px 0;">💖</div>
        <div style="font-size:0.8rem;font-style:italic;color:rgba(60,20,40,0.4)">Con amor, siempre</div>
        <div class="ornament"></div>
        <div class="page-num left">Pág. ${(i+1)*2}</div>
      </div>
    `;

    container.appendChild(page);
    allPages.push(page);
  });
}

// ════════════════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════════════════
function updateNav() {
  const total = allPages.length;
  document.getElementById('btn-prev').disabled = currentIdx <= 0;
  document.getElementById('btn-next').disabled = currentIdx >= total - 1;
  document.getElementById('page-indicator').textContent = `${currentIdx + 1} / ${total}`;
}

function openBook() {
  if (isOpen) return;
  isOpen = true;
  document.getElementById('cover').classList.add('flipped');
  document.getElementById('nav-bar').style.display = 'flex';
  document.getElementById('add-btn').style.display = 'flex';

  // Mostrar Spotify
  const frame = document.getElementById('spotify-player');
  frame.style.cssText = `
    position:fixed;bottom:90px;right:20px;left:auto;
    width:300px;height:80px;opacity:1;border-radius:12px;
    pointer-events:auto;z-index:999;
  `;
  document.getElementById('track-name').innerText = '♩ nuestra playlist';
  playing = true;
  document.getElementById('play-pause').innerText = '⏸';

  setTimeout(() => { goToPage(0); }, 700);
}

function goToPage(targetIdx) {
  if (isFlipping) return;
  if (targetIdx === currentIdx) return;
  if (targetIdx < 0 || targetIdx >= allPages.length) return;

  isFlipping = true;

  // Construir lista de páginas a voltear/des-voltear en orden
  const steps = [];

  if (targetIdx > currentIdx) {
    // Avanzar: voltear páginas currentIdx+1 … targetIdx
    for (let i = currentIdx + 1; i <= targetIdx; i++) steps.push({ page: allPages[i], flip: true });
  } else {
    // Regresar: des-voltear páginas currentIdx … targetIdx+1
    for (let i = currentIdx; i > targetIdx; i--) steps.push({ page: allPages[i], flip: false });
  }

  let step = 0;
  const run = () => {
    if (step >= steps.length) {
      currentIdx = targetIdx;
      updateNav();
      isFlipping = false;
      return;
    }
    const { page, flip } = steps[step];
    if (flip) page.classList.add('flipped');
    else      page.classList.remove('flipped');
    step++;
    setTimeout(run, steps.length === 1 ? 0 : 120);
  };
  run();
}

function nextPage() { if (!isFlipping) goToPage(currentIdx + 1); }
function prevPage() { if (!isFlipping) goToPage(currentIdx - 1); }

// Teclado
document.addEventListener('keydown', e => {
  if (!isOpen) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevPage();
});

// Swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend',   e => {
  if (!isOpen) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (dx < -50) nextPage();
  if (dx >  50) prevPage();
});

// ════════════════════════════════════════════════════════
// FRASES PERSONALIZADAS — localStorage
// ════════════════════════════════════════════════════════
function loadCustomQuotes() {
  try { return JSON.parse(localStorage.getItem('libro_frases') || '[]'); }
  catch { return []; }
}

function saveCustomQuotes(arr) {
  localStorage.setItem('libro_frases', JSON.stringify(arr));
}

function openModal() {
  document.getElementById('inp-quote').value  = '';
  document.getElementById('inp-author').value = '';
  document.getElementById('inp-book').value   = '';
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function saveQuote() {
  const quote  = document.getElementById('inp-quote').value.trim();
  const author = document.getElementById('inp-author').value.trim();
  const book   = document.getElementById('inp-book').value.trim();

  if (!quote) {
    document.getElementById('inp-quote').style.borderColor = '#c2678a';
    document.getElementById('inp-quote').focus();
    return;
  }

  const quotes = loadCustomQuotes();
  quotes.push({ quote, author, source: book || 'Nuestro libro', book, savedAt: Date.now() });
  saveCustomQuotes(quotes);

  closeModal();
  buildPages();   // reconstruir páginas con la nueva
  updateNav();

  // Ir a la última página (la recién añadida)
  setTimeout(() => {
    goToPage(allPages.length - 1);
  }, 400);

  showToast('✦ Frase guardada en el libro 💖');
  spawnHearts();
}

let pendingDeleteIdx = -1;

function confirmDelete(customIdx) {
  pendingDeleteIdx = customIdx;
  const quotes = loadCustomQuotes();
  const q = quotes[customIdx];
  const preview = q ? `"${q.quote.substring(0, 60)}${q.quote.length > 60 ? '...' : ''}"` : '';
  document.getElementById('confirm-preview').textContent = preview;
  document.getElementById('confirm-modal').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-modal').classList.remove('show');
  pendingDeleteIdx = -1;
}

function deleteQuote() {
  if (pendingDeleteIdx < 0) return;
  const quotes = loadCustomQuotes();
  quotes.splice(pendingDeleteIdx, 1);
  saveCustomQuotes(quotes);
  closeConfirm();

  // Volver una página antes de reconstruir para no quedar en el vacío
  const newIdx = Math.min(currentIdx, fixedPages.length + quotes.length - 1);
  currentIdx = -1; // reset para que goToPage funcione desde 0
  buildPages();

  // Regresar a la página correcta sin animación
  for (let i = 0; i <= newIdx; i++) allPages[i].classList.add('flipped');
  currentIdx = newIdx;
  updateNav();

  showToast('Frase eliminada del libro');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function spawnHearts() {
  const emojis = ['💖','💗','💕','🌹','✨','💫'];
  for (let i = 0; i < 7; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-heart';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left   = (20 + Math.random() * 60) + 'vw';
      el.style.bottom = '15vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }, i * 120);
  }
}

// Cerrar modal al hacer clic fuera
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ════════════════════════════════════════════════════════
// CONTADOR + FECHA
// ════════════════════════════════════════════════════════
function updateCounter() {
  const now  = new Date();
  const diff = now - ANNIVERSARY;
  if (diff < 0) return;

  const days = Math.floor(diff / 86400000);
  const h    = Math.floor((diff % 86400000) / 3600000);
  const m    = Math.floor((diff % 3600000)  / 60000);
  const s    = Math.floor((diff % 60000)    / 1000);

  document.getElementById('days-count').textContent = days;
  document.getElementById('hms').textContent =
    `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
}

// Fecha bonita de cuando se conocieron
const sinceDate = ANNIVERSARY.toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' });
document.getElementById('since-line').textContent = `Desde el ${sinceDate} 💖`;

setInterval(updateCounter, 1000);
updateCounter();

// ════════════════════════════════════════════════════════
// PARTÍCULAS (ligeras)
// ════════════════════════════════════════════════════════
const canvas = document.getElementById('particles-canvas');
const ctx    = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let particles = [];
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (particles.length < 18 && Math.random() < 0.08) {
    particles.push({ x: Math.random() * canvas.width, y: canvas.height + 10, speedY: -(Math.random() * 0.5 + 0.2), opacity: 0.55 });
  }
  particles = particles.filter(p => p.opacity > 0);
  particles.forEach(p => {
    p.y += p.speedY; p.opacity -= 0.0012;
    ctx.fillStyle = `rgba(232,160,180,${p.opacity})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

// ════════════════════════════════════════════════════════
// SPOTIFY
// ════════════════════════════════════════════════════════
let playing = false;

function getSpotifyFrame() { return document.getElementById('spotify-player').contentWindow; }
function sendSpotify(action) {
  try { getSpotifyFrame().postMessage({ command: action }, 'https://open.spotify.com'); } catch(e) {}
}

function toggleMusic() {
  if (playing) {
    sendSpotify('pause');
    document.getElementById('play-pause').innerText = '▷';
  } else {
    sendSpotify('play');
    document.getElementById('play-pause').innerText = '⏸';
  }
  playing = !playing;
}

function spotifyNext() { sendSpotify('next'); }
function spotifyPrev() { sendSpotify('prev'); }

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
buildPages();
</script>
